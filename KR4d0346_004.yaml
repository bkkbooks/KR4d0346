body:
  text: 庸齊集卷四宋趙汝騰撰箋明堂禮成賀箋欽柴宗祈聿嚴美報承德合敬克贊熙成二神迎釐萬國稱慶中賀恭惟皇后殿下柔嘉維則塞淵秉心肅肅雍雍助王假有家之治洞洞屬屬佐聖能饗帝之忱禮畢清壇恩朌率土臣猥叨虎竹阻效駿奔詠我將之詩遙稱伊嘏賡思齊之雅敬頌徽音皇太子冠禮成賀箋元子勝衣肇封王社新陽備服盡敬阼階慶溢宫闈歡傳海宇中賀恭惟皇后殿下關睢閒靜之德鳲鳩均一之心佐王假於有家在中饋吉受子拜於北面陳三醮辭臣猥任竹符阻趨班列不圗壽春之冠禮復見於今遙贊渭涘之母儀可通於古皇子進封忠王賀箋聖主訏謨以燕翼子宗藩令望而爵為王茅土增輝椒塗錫慶中賀恭惟皇后殿下秉心均一制行柔嘉推樛木逮下之仁宫庭歸美佐豐水貽謀之烈社稷䝉休至哉坤元成此震器臣猥以屬籍獲玷承流望司空披地之圗喜聆冊命歌大明俔天之雅遙頌徽音疏功德疏伏以自天生聖蓂五策以呈祥惟帝與齡嵩三呼而效祉聿伸善頌實仗勝因伏願皇帝陛下德合無疆功施罔極受祉施于孫子萬年惟王斂福錫之臣民八荒皆壽劄子內引第一劄壬子六月三日以春官夕郎召對臣聞明德新民者帝王之能事也止於至善者明新之極致也茍不止於極致以僅可為稅駕則明者復昏新者復舊其幸而頻復猶為厲也其不幸而迷復咎可知矣皇帝陛下聰明神武生知法式蓋自踐阼以來即垂意於宗社生靈方其握真德秀手而與之商榷當世何其清且明也奈何彌逺恃恩舊之為相日夜以仇士良術蠱陛下賴天之靈彌逺自斃陛下昭德塞違之志於是始形中而發外端平甲午乃陛下明德新民第一機也不幸清之復以恩舊相不學無術無以上佐陛下之末光而更用彌逺故智進邪說以蠱陛下方陛下鋭於與士夫更始彼乃蠱以藏疾匿瑕之說陛下思保金甌彼乃蠱以耀武開邊之說陛下為天下守藏彼乃蠱以損下益上之說三說進而陛下之明明德者晦矣所謂新民當時諸賢莫不悉聘然德秀了翁號忠直之尤乃踰年而後召逮其翔集河洛之師一舉而大敗矣陛下新民之志頓為之消沮於是嵩之復出理襄漢天錫入政事庭蔣峴據臺諌矣使陛下不收端平更化之功者清之誤陛下也然亦陛下知以明德新民為更化而不知以至善為止也其後嵩之以恩舊猶子相挾勢怙權公論拂鬱幸而嵩之以經營起復敗陛下好善惡惡之衷於是形於夜半而白於宇宙間矣甲辰乙巳是又陛下明德新民第二機也然以范鍾為相首鼠脂韋繼相遊似僅以人望不幸值朋奸之鄭宷以說化臺諫為智術聚斂之與以蠱惑上心為智術圗為凶奸復出之地執政且多齟齬經筵又望恩之清之伺間抵巇傾攘相印變白與黑無所不至陛下昭昭明明者又大蝕於是數人之手一時侍從館學雖號極天下選然臺諫給舍未純何益於作新之治未幾監督說進似罷葵出而清之相矣使陛下不得收淳祐甲辰乙巳更化之功非鍾輩有以誤陛下歟然亦陛下知以明德新民為更化不知以至善為止也清之再相庸轉而謬其徒又皆寡亷鮮恥識慮不逺更羽翼其惡至謂之空諸賢空士類當是時凶德參㑹賄道盛行敻班華列率以錢神秉節持麾預議價直突未及黔相府遣蒼頭奴索逋矣使清之更無恙一貪相扇中外放效黎元何辜宗社事可知矣賴其自斃牖下是又天錫陛下以明德新民第三機也陛下所當痛自悔艾改過遷善百倍於端平甲午淳祐乙巳可也世道庶乎可以救藥聞之道塗深有未然元載之汚何止椒斛今縱未能少抑以為萬世宰相之戒奈何從而表章錫以美諡是昭昭然揭其惡於天下後世不愈播元載之醜乎李綱汝愚血忱衛社得諡忠定彼亦諡忠定何以慰綱汝愚地下乎宇文士及初諡恭後諡謬唐太宗猶能出此謂陛下不能乎無怪乎或者議陛下之明德有所好樂不得其正也李義府之殘見謂人猫縱未能少施行以為萬世臺諌之戒奈何至出內批以為之地端平李知孝梁成大逐淳祐劉晉之王瓚逐皆無所靳何至於今獨難之乎猶之可也奈何繳駁之臣朝有所奏暮乃與之同出唐髙宗惡王義方劾李義府遂出義方聖明之主何至效尤此舉乎無怪乎或者議陛下之明德有所忿懥不得其正也王鉷之惡斂怨基危今縱未能少懲以為萬世盜臣之戒何至御筆為之止臺牒夫臺諌之糾官邪使君子耶色斯舉矣無待於評何暇於牒使小人耶營護甚至麾不得去僅賴有牒若止臺牒則臺諌自此無尺寸權矣或謂陛下為端人正士計夫果為端人正士但當擇臺諌不當止臺牒得非不能不私繫興利之鉷耶漢武帝噬臍桑孔之用乃使痛改拳拳冨民侯之封武帝猶知出此孰謂陛下不能乎無怪乎或者得以議陛下之明德未能以義為利也是三者皆陛下明德之大者晦蝕若此是必有先入之說衡陛下之心矣獨有元日之除諸賢盡起人無異辭庶幾有意於新民者然是日同除尚多公論指目之人牛驥同皂薰蕕同器得無以皇極並用君子小人之說誤陛下歟中外皆曰弓旌雖召於英彥太阿猶寄於庸人有當任言責不使任言責有當任封繳不使任封繳近者六士之除出於同日人又稱善然英竒方正可但置之少蓬潛郎耶惜布置之未當也又况京檜雖斃而京檜之黨猶在列公論惡垓榮而與垓榮相左右者在君側公論惡鈞震而與鈞震濟惡者方嚮用操元祐之舟未免熙豐之蒸徒慕慶厯之治乃習靖國之矩矱甚無謂也豈陛下之明德於賢未必真好於惡未必真惡歟自端平來凡三更化未有若今兹之駁雜晦昧為甚陛下儲神蠖濩燕居深念亦嘗知機括所在乎拳拳恩舊之心太重私繫羣小之心未忘陛下回思二十二年恩舊之臣相踵為相陛下正恃彼以為腹心不知其誤國事特甚拳拳恩舊之念亦可以息矣回思前後奸諛之臣傷善害賢自取髙官要職何益於陛下而深損於聖德興利之臣移東就西順適宫禁自遂溪壑無厭之欲何益於陛下而深戕於國脉則陛下私係羣小之心可以息矣自念其始赫然發憤大昭明德自逺聲利始以作新民自用忠賢始明之而又明理欲之界定新之而又新邪枉之塞除必至於至善而後止何患乎朝綱不肅國維不張吏治不舉兵弱而召侮者可強民貧而思亂者可弭可以固人心可以永天命可以復慶厯嘉祐之治所謂休復之仁是也不然無明新之實以義為表以利為裏以理為賔以欲為主以名召君子以實用小人但取一二施行以為更化之塞責是所謂迷復之咎也尚何至善之為勉臣竊為宗社生靈危之臣衰老多病憂患仍年雖有畎畝愛君之心而無驅馳當世之想忽逢改紀元旦親擢肺腑末屬義難固避不逺二千里扶曳為宗社一來陳瀝悃欵以告陛下幸陛下垂聽臣言力扶世道以慰祖宗在天之靈以遂朝野惟新之望臣歸卧林泉無憾矣取進止第二劄臣觀清之用事羣枉蟠結衆賢悉空剝之碩果不食時則有臣方叔復之朋來無咎時則有臣濳清之既斃凶奸睥睨台鼎中外凛然有再相皇甫鎛之懼制麻剔庭付以二儒逺近歡呼皆曰改元載之汚興起治功者必二儒也側聽纍月殊未有以愜快人意道塗傳聞謂陛下春秋髙明習天下事斷必然中出建明不專採丞相吏必欲自除啓擬不專聽丞相奎筆內批絡繹至中書堂宰相但奉行文書爾臣以為果如所聞陛下誤矣臣知陛下出此也懲積年恩舊諸臣之誤國既不能收之於前而欲收之於後也悔恩舊之不可制而意儒臣之可制也而不知元首捨股肱無獨運之理三公充位建武之失政兼行將相太宗之失言若事必欲由中則是失君人之要掣輔相之肘開便嬖私謁之門韋處厚所謂何名執政是也是無益於懲疇曩之誤而愈開後日之大失也傳聞道塗二相近因細故微有芥蒂果如所聞丞相誤矣今諸賢畢集全賴大臣協和小人不得以乘間則君子可安吕大防劉摯吏額之爭至微也而揚畏乘之而入遂致黨禍唐史稱房𤣥齡如晦持衆美而效之君必首書曰二人深相知故能同心濟謀以佐佑帝嗚呼厥旨微哉今二揆素號氣同志合也奈何以一議論區處之不同而微生間隙乎意有小人往來出沒其間耶常衮不悅楊綰之建明趙憬不悅陸贄之裁决此庸常之見也而謂二揆為之乎范仲淹韓琦富弼於上前未嘗不爭辨下殿不失和氣此二揆之所當法也今天下事可寒心者多而最大者三吾君有堯之明而前後共鯀之臣更出而蔀障之使清明晦蝕故施行駁雜私謁往往因之今大臣當以李沆之事真宗者事陛下有大事必力陳得失如但道沆以為不可之類國本者天下安危治亂之所係資善久建而名位未正忠臣義士不無夙夜嫠不恤緯之憂今大臣當以韓琦之贊仁皇者贊陛下如琦答司馬光曰敢不盡力是也小人固無可耘絶之理而界分不可太嚴今章厚蔡確雖去而日夜與忠賢對壘况張璪之徒尚又居中大臣當以司馬光之在元祐者為法如光曰天若祚宋必無此事是也此今日之大綱目其他可以次第舉矣若吾君之向善與諸賢之盡職在力行好事翊成盛治使君都顯代臣荷美名民生漸見阜康之世豈不盛哉區區一時之異同豈足以芥蒂而猶未平耶今天下蠱壞於清之極矣以元亨治蠱在陛下佐陛下幹蠱用譽在大臣陛下操綱責成大臣和𠂻共政天下事尚可為也惟陛下與大臣留意取進止貼黃臣觀今日諸賢畢致其間可為慶厯四諌者有數人焉頃臣嘗薦八士又今薦六士是也至若徐霖又超越流輩霖道德風操海內皆知豈待臣言然臣察其才具頗與范仲淹相上下望陛下即栽培而用之至若留夢炎抱負涵養植立亦亞於霖者也豈但為臺諫經幄人物亦望陛下拔試之伏乞睿照又貼黃臣道過衢州江山管下細民艱食一夫大呼而大户閉逃小户奔竄凛凜然如利兵之在頸鎮安都尤甚近畿之地此景何可見臣竊以為民饑則思亂固已言之守臣矣衢與信鄰聞信管下尤甚此去食新尚多日而浙西米狼戾朝廷何惜不損數萬石粟以救兩郡管下之饑羸哉伏乞睿慈施行幸甚再辭免申省劄子右某昨控免章仰回淵聽更䝉溫詔曲賜褒嘉某何足以上稱某非不能上體聖意勉拜新渥緣給舍之職與臺諌同不得其言則當去不得其職則當去某駁葉大有言既不行職又它徙此某之當去也某在山林無意一出元旦新擢畀某瑣闥某躍然而起曰此君子小人進退之關也吾皇有意於使天下平治歟是不可不一出以佐明聖舉直錯枉之舉供職兩月凡所論駁不敢捨豺問貍亦不敢近名避怨審安危治亂之所大係然後言焉諌行言聽天下方誦聖德今忽駁諫議葉大有不行徙某翰苑是收某封駁之權使某不得復言大有此某之當去也某非悻悻者每論人必平實今某與大有無兩立之理出晝不敢窮日力而去正欲望聖主之亟改今大有自若某則當去而可拜命乎洊具免牘如䝉朝廷得賜敷奏且畀臣祠祿待年嵗間用某未晚所有恩命某未敢祗受謹具申尚書省伏候指揮三辭免申省劄子右某近再具狀辭免新除翰林學士兼知制誥時暫兼吏部尚書恩命伏准省劄備奉聖㫖依已降詔不允今日入門供職某三瀝血忱仰干淵聽伏念某譾庸無取過䝉陛下殊知渥眷閔其封駁之勞佚以詞苑之職寵以吏書之貴聖恩天大某何以酬屬以言既不行職又它徙所以出國門俟命䝉聖主霽威體察而溫詔光華奎筆焜耀都曹仍日而宣天㫖詞臣乘夜而導玉音凡所以輝賁某者至矣某何敢不亟祇職守然足既出關義難再入疏嘗指佞勢不容留欲望朝廷詳與敷陳早畀祠廩免其濡滯江臯實拜乾坤之造所有恩命某不敢祇受謹具申尚書省伏候指揮奏狀繳趙以夫不當為史館修撰事奏右臣伏准中書門下省録黃五月二十三日三省同奉聖㫖尤焴兼祕書監髙斯得兼直史館牟子才兼史館檢討李獻可兼史館校勘臣觀焴斯得子才三人皆儒雅有詞筆獻可家有史學亦無可議惟史館之長端明趙以夫人品庸凡寡亷鮮恥心術回邪為鬼為蜮凡善類空於陳垓之手者皆半與焉王伯大盧壯父特其一二也鄭清之以雅故欲開其殊渥遂以進史屬之以夫四海傳笑謂其進易尚且代筆而可進史乎其後聞其為史館長人又笑曰是昔日以代筆進易之以夫也及更化後領史館如故人又笑曰是又即昔日以代筆進史之以夫也夫史天下萬世公是非之筆韓愈猶不敢當而以夫不學不文凡有奏陳輒求假手乃敢冒然當之豈獨萬口傳笑臣入國門見諸賢之議藉藉執政徐清叟問臣臣不敢答其後諸賢又言之或謂其不識文義於舊作擅加改竄或謂其作南渡以前史妄通貫為一曾鞏洪邁猶不敢而以夫乃冒然率屬為之人有不祥之議臣乍到不得而詳知其是與否但以其心事回譎天下號為奸魁又素無文學何至敢擅秉史筆乎臣與之薄有葭莩本不欲言見公論藉藉之甚又思奸回不去梗陛下之更化臣不言一罪也祖宗國朝史豈可使不識文義之人擅加塗竄祖宗在上未必不震怒臣不言二罪也其他官皆可使無文學人為之史乃詔萬世公是非而可使動求假手之人為之人言藉藉謂自古無求代筆之司馬遷此豈可以傳天下聞外域示萬世臣而不言三罪也揣度以夫之意無他不過昻首望執政恩例耳藉此為他日名色非材取誚不知辱國辱祖宗為甚欲望皇帝陛下赫然威斷畀以夫名藩權以史事屬之尤焴為之長固能成大典亦可免天下後世笑伏望聖慈亟賜施行宗社幸甚公道幸甚玉音勉諭入門回奏右臣恭凖樞密都承旨陳力修傳道玉音勉諭臣入國門就職仰佩聖眷至於感泣惟是臣嘗論諌議葉大有以此妨嫌未敢供職伏望聖慈矜軫特畀祠廩臣不勝幸甚謹録奏聞謹奏辭免復職與宫觀奏狀臣今月十八日恭凖尚書省劄子十一月二十日三省同奉聖㫖趙汝騰陳愷楊棟黃師雍吳子良並復職與宫觀者臣竊以蒙上殊恩畀臣祠廩恍然簡記及於衰陳伏念臣屬籍孤生愚忠自信但竭血忱而狥國有諍無欺不知機穽之臨身濵危弗悟積罪條之莫數果吏議之難逃仰藉皇明得歸里閈混迹漁樵之際息影山林之深痛省往愆絶念竊食豈謂天函而地育頓令陽復以回春靖惟揆分過盈何敢無功受祿冒祗寵數是速顛隮伏望皇帝陛下曲軫微蹤亟收渙號俾仍窶賤之素守實荷扶持之至仁所有上件恩命臣未敢祇受再辭免除寶章閣學士提舉隆興府玉隆萬壽宫恩命奏狀臣昨具奏辭免復職與宮觀恩命事正月二十五日恭被詔書所辭宜不允又於三月十七日凖二月空日尚書省劄子正月十一日奉聖㫖趙汝騰除寶章閣學士提舉隆興府玉隆萬壽宫任便居住者臣洊瀝赤忱仰干淵聽伏念臣頃塵華綴坐觸煩言自離修門未嘗有隻字之入雖在農畝不敢替一念之忠方痛勉于省修忽上形於簡記亟陳避牘旋拜褒綸赦其曩時妄發之狂嘉其中心樂告之實超畀職名於寶學趣祇祠稍於殊庭固知聖主優賢尚德之恩賁於駑朽惟是愚臣負罪積愆之跡益以凌兢况兼頭童齒豁之衰不勝福過災生之懼用忘再瀆祈免新榮伏望皇帝陛下亮臣之衷愛臣以德亟寢已班之渙渥庶安屢空之閒蹤所有前件恩命臣未敢祇受三辭免除寶章閣學士恩命奏狀臣昨再具奏辭免恭奉聖㫖除寶章閣學士提學隆興府玉隆萬壽宫恩命五月二十二日凖尚書省劄子備奉聖旨依已降詔不允不得再有陳請者臣聞豫祠者繼粟之隆恩加職者優賢之令典兹其避就之維谷必也辭受之得冝伏念臣初無他腸粗罄愚臆國人以為可舍當寧獨謂不然包容掩覆者三朞抆拭牽復於一旦蓋列祖家法扶植能言吾皇聖明務憐遺老佚以珍臺之散躋之學士之真臣罪當誅豈應得此君仁善養何可違乎况優閒得以祝釐遂免拜除庭之秩然空疏慚於顧問其敢陪邃閣之聮昔朱熹去國以投閒葉適奉祠而終老一則僅畀待制一則姑置寶謨不應屬籍之晚生乃軼前修之茂渥踰榮為懼三瀆而祈伏望皇帝陛下察臣忠忱劑臣分量特放宸㫖亟寢職名上以昭出令之公下以免貪榮之誚此生畎畝永戴乾坤祠命降已一面擇日祇受所有新除寶章閣學士恩命欲望聖慈特賜寢免謹録奏聞伏候勑㫖四辭免除寶章閣學士恩命奏狀臣六月十一日祇拜恩命望闕謝恩訖所有寶章閣學士恩命臣已三具奏辭免七月二十日恭被省劄六月二十三日奉聖㫖依已降指揮不允不得更有陳請者臣謹昧萬死僣殫一忱伏念臣文采不過尋常問學亦惟沿襲得歸故里分甘畎畝之終投念咎杜門但冀桑榆之寡過聖世掩瑕而匿垢皇恩畀職以豫祠莫遂循牆既拜殊庭之渥自知負乘難勝寶閣之除惟有籲天祇收成渙緣臣頃攝工書而在列今躐學士而為真政使鴻儒尤當力遜况如謭職其敢冒居在昔朱熹亦有舊比除祕撰主太乙則受太乙而力避祕撰之命授待制祠鴻慶則拜鴻慶而乞寢待制之名其在當時皆從所請或改祕撰而仍寶文之直或收待制而頒祕撰之稱此愚臣援是以力辭冀陛下念之而寢免或命改畀其次則臣祇受而安真切陳情恭俟報可所有寶章閣學士恩命欲望聖慈亟賜寢免或畀以次職名臣下情無任瞻天望聖激切屏營之至四辭免閣職申省狀某伏讀劄命不勝感懼惟是揆義弗安拜恩未敢謹已四具奏乞回天聽伏念某頃者在列只是攝工書今於杜門念咎之中乃忽畀其學士之職超躐太甚兼非才而授何以塞公論踰分而得實足招譴咎昔朱熹嘗兩力辭職名當時皆蒙從請辭祕撰則改直寶文閣辭待制則改畀祕閣修撰是皆前修厥有成比今某所陳匪為矯飾欲望朝廷特賜敷奏亟寢職名或改畀次使某受之而安為幸莫大五辭免寶章閣學士恩命奏狀臣近四具奏辭免寶章學士恩命恭凖省劄八月十四日奉聖㫖依纍降指揮不允不得再有陳請者臣輒冒刑誅晉攄悃愊伏念臣於杜門循省之際叨自天抆拭之恩奉祠仙聖之庭已為徼幸罣名奎壁之次覺甚超踰又况直學士之除未有權尚書而得洪遵以翰長去國髙宗特旨而但直徽猷黃度以吏侍補州寧皇殊遇而僅除集撰則今異數豈臣宜䝉非不知上體眷懷奉丁寧而亟受然未免周思分義覺愧赧以難勝若云成渙之已頒則有先朝之舊憲兩狥朱熹所陳改職之請一昭聖時毋嫌反汗之公蓋許其辭尊居卑則受者既安且吉伏望皇帝陛下矜憐衰朽保全憃愚察臣非苦避於職名念臣實難超於寶閣特出睿㫖收還誤恩使逃負乘之譏實荷生成之造所有前件恩命臣不敢祇受貼黃臣凖吏部降到寶章閣學士一道臣不敢祇受已寄留福州軍資庫伏乞睿照五辭免閣職申省狀某伏讀劄命不勝震懼非不知上體公朝盛意黽勉祇受實緣先朝舊比未有權尚書得真學士者洪遵以翰長去國髙宗特㫖除直學士後只除徽猷閣直學士某頓攝工書甫及四月以罪而去雖涉三朞然理舊班非正文昌不應閣職得真學士若曰成命已頒不容反汗然昔者先朝兩從朱熹改職名之請用是昧死謹五具奏辭外欲望朝廷特賜敷陳收還恩數或改畀雜學士使某受之無躐等貪榮之誚不勝萬幸六辭免除寶章閣學士恩命奏狀臣伏凖省劄以臣五辭免除寶章閣學士恩命奉聖旨依屢降指揮不允不得更有陳請臣籲天德邈局地忱祈惟職名之有崇有卑皆以示勸於羣下若寵數之或辭或受必思勿玷於四維臣光非不被神祖之知乃六避副使之命臣熹非不䝉寧皇之眷亦六遜待制之除在先朝尚多有之則舊貫皆可覆也如臣極陋取數過盈頃焉俾若豫工姑攝常伯今也徑躋實閣是正文昌豈應省愆念咎之蹤沐轉假為真之擢淵升之膝陛下欲借以光華谷遷而喬微臣增益於危懼非效沽激而飾辭遜正以全羞惡而逃震凌控免一朞豈臣得已犯顔六奏冀上垂憐伏望皇帝陛下特諭公朝改畀雜學命朝下而臣夕可拜上豫當而臣受為榮真九殞之莫酬昧萬死而復請所有前件恩命不敢祇受
