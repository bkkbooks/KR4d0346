body:
  text: 提要庸齋集六卷别集類三宋臣等謹案庸齋集六卷宋趙汝騰撰汝騰字茂實庸齋其自號也太宗七世孫居于福州登寶慶二年進士歷官端明殿學士提舉佑神觀兼翰林學士承旨事迹具宋史本傳其集宋史藝文志及諸家書目皆不著録厲鶚宋詩紀事載宋宗室共七十五人亦無汝騰之名惟永樂大典各韻中間收入汝騰之文有題趙庸齋集者有題趙庸齋蓬萊閣紫霞州集者又有題庸齋瑣闥集者而舊序已佚其卷目次第不可復考謹搜羅殘缺釐次成編析為六卷篇帙無多可無煩名目統題作庸齋集以歸于一汝騰生朱子之鄉故沿溯餘波頗能講學然史稱其守正不撓其為禮部尚書兼給事中時上疏極論姦諛興利之臣戕損國脈而規切理宗之私惠羣小今集中壬子六月內引對第一第二劄即其全文反覆詳明深中時弊又集中內外制序自稱嘗以草制忤史嵩之去國又稱時有無罪被謫如王三俊李伯玉之類皆留黃不書上疏申救施行遂為之格是其氣節嶽嶽真不愧朱子之徒非假借門墻者可比惟考周密癸辛雜識稱汝騰為從官力薦三衢徐霖為著作郎至比之范文正公而霖舉止顛怪妄自尊大霖之無忌憚皆汝騰縱其狂至目汝騰為大宗師已為小宗師遞相汲引霖既被逐汝騰亦不自安遂求補外云云按集中與徐徑坡唱和最多徑坡即霖之字其贈詹生謁徑坡詩云瞻彼徑坡今之泗水又贊徑坡使君柯山講席之盛詩云立天地心鳴道鐸開生靈眼識師儒其推挹之詞殊為誕謾無狀知周密所紀為不誣是則宋季士大夫崇尚道學矯激沽名之流弊亦不容為汝騰諱矣觀于是集良足為千古炯鑒也乾隆四十六年九月恭校上總纂官臣紀昀臣陸錫熊臣孫士毅總校官臣陸費墀
