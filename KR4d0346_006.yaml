body:
  text: 庸齊集卷六宋趙汝騰撰銘施令君濆恪軒銘鹽官令君施源父之先大夫辟南鄉之堂於地得古銅龜文剜安恪二字扁堂之後牖曰恪源父復以恪名軒朝夕自警求銘於庸齊趙某銘曰維正考父校商頌作曰古先民執事有恪先正正獻仕於孝皇小心謹恪以致贊襄厥後象賢地中得龜有文曰恪扁堂以之孜孜令君克紹家聲朝夕寶兹軒以恪名昔劉康公嘗對於王敬恪恭儉臣道之常以恪守業不及於憂康公斯言有益世猷令君勉哉正獻之門其飭爾躬爾子爾孫贊蔡覺軒遺像贊山澤之儒公輔之器禀厚體莊養深氣粹著書滿家有道名世無忝考亭所命字義祭文祭克齊游丞相文中興以來名相江表忠簡忠定衢饒二趙以道宅揆簡册焜耀厥後寥寥惟公克紹本原濓洛知學之要被服家庭漸濡自少暨擢周行植立皎皎疏指權門痛哭原燎紹定斥去端平收召嘉熙融風排雲上呌明倫有疏血忱應詔淳祐初年操守徑峭薰恥蕕並歸尋荷蓧乙已改絃秉鈞廊廟以學告王說立惟肖以道覺民尹任不小丙午厄歲力扶世兆諸賢鳴陽羣邪息爝惜多牽挈沮莫運掉一念開誠杲日可照孤忠自知憸壬旁誚卞莊巧同姜公直釣因危遂擠善刀為妙霅溪午橋臨流舒嘯手袖文富望穹馬邵靈光巋存落月孤皎訃音流傳搢紳相弔殄瘁之哀天意莫曉荷公已知不鄙庸謏嘗䝉專使來訪海嶠尺箋殷勤如侍色笑頃聞公恙為之心慓孫枝書來公已不療悲慟莫任阻送丹旐亟裁哀詞以佐絮醥祭考太中墳文月正元日上親擢汝騰於要列控辭不獲已祗拜命行造闕庭逖逺松楸不勝悽咽惟是某衰老勉為宗社一出決不敢墜先訓虧晚節負天下公議我考妣其相之祭弟帳幹墳文月正元日上親擢兄於要列再控辭不獲已祗拜命行造闕庭違逺松楸不勝悵然敬以薄祭見忱爾其鑒之弟味道漳州使君祭文頃哭大兄執手淚墮猶云斗粟賴爾同簸爾遽奄殁令我衰挫吾宗不多又弱一箇爾心甚平爾行無頗為善若渴棄榮如唾神何所疵乃降之禍天道親仁欲測則叵秋初書來簿書坎軻禱旱蔬食勸分事夥繼聆禳療醮拜勞疸請告治疾委政僚佐吾甚憂恐心如飛笴孰知永訣不報痊可抱恨一方莫適藥褁遣介候爾一面亦蹉爾子書云爾逝如臥目未瞑間猶能寂坐何去之速駭愕耆懦莫視爾殮淚眥幾破傳聞漳氓號泣道左追感循良龔黃治課生於桐鄉死留碩果每一慟爾不覺哀過幾欲無生凡百廢惰爾旐來歸爾魂安妥英爽凛然盍夢於我一樽酹爾文寫悲些爾子崇鍴孝誠通天欲持饘粥以至三年吾為爾思只有一子過於毁瘠則將何恃况其禀弱風寒易鑠若更蔬腸胃氣轉薄先王禮經以義酌情哀至滅性以不孝稱吾為之懼俾勿茹素爾尚祐之顯揚事巨祭弟漳州使君文月正元日上親擢兄於要列控辭不獲被㫖趣行即日就道惟是日夜念弟未得窀穸今兹兄有遠行無由視爾葬事思之泫然流涕惟當執筆以發爾幽光菲祭并白此忱祭鄭碩人欑所文豫歸來得閒為爾卜地凡三年矣近始得一二所而日者謂爾葬年月未利且豫又叨上親擢之命控辭不獲被㫖趣行旦夕即就道乃尚滯爾於欑房不勝悽惻之至敬以菲祭白此𠂻忱爾其鑒之碑文資政許樞密神道碑淳祐戊申九月九日前僉書樞密院許公應龍薨於三山府第其孤峻以己酉四月奉公兆於聖泉寺西余適以罪歸里峻哭泣拜以端明李公韶所為事狀來乞筆隧道之碑豫辭峻請益力經年不輟豫惟昔者給劄玉廬實公發䇿則今執筆以銘公實宜又豫仍年居閒採諸旦評皆謂公居鄉可法不干請州縣不侵漁田里年踰八秩而手卷不輟貴躋政地而延士不倦庶幾前輩氣象是可書之尤者也謹按公字恭甫閩縣人曽大父泰初贈太子少保妣王氏贈文安郡夫人祖材宣教郎贈太子太傅妣謝氏贈蘄春郡夫人父仲宏承議郎知漳州漳浦縣纍贈少保妣張氏福國夫人少保厯官清白生於建安尉廨乾道戊子九月八日也公幼頴悟四歲受書立上口五歲曉經㫖間侍少保坐客以小兒氣吞牛命屬之公應聲曰丈夫才吐鳯四座嘉歎一夕夢至一所雄壯珍麗如王者居下有石石有字傍有導公至其上又更導公歷踐十餘石覺以白少保少保曰石上有字者文石班也汝異日踐其地十三善屬文時時為儷語識者謂有詞掖氣少保殁侍福國夫人盡孝刻志記覽之學日抄夜諷嘉定壬戌補入太學連取解嘉定戊辰擢進士甲科教授臨汀作成後進甚至偶學職缺員郡將意有所屬公一遵法守視分升降郡將無以奪漕檄主文富沙所得士後皆有聞徐參預榮叟其一也秩滿堂差浙東撫掾畫諾有聲差户部架閣除藉田令太學博士時李全時青輩歸附公慮山東有偏重之勢因登對有荓蜂是懲養虎遺患之說後皆如公言除國子博士國子丞宗學博士時皇上踐阼公對首陳正心為治國平天下之綱領除祕書郎兼權尚右郎官除著作郎盜發汀邵綿亘數郡公登對乞以大軍土兵相為應援招捕司得以便宜從事上皆嘉納丐外得守潮州汀邵冦甫平而鄣冦陳三槍作出沒江閩廣間勢熾甚元樞陳公韡帥江西任招捕三路調官兵分道追勦潮連汀贑循梅惠盜聲搖四鄙興寧勇丁鍾全之徒乘釁起且逼境上公亟調水軍禁卒鼓樓赤砂兩寨土兵三縣弓級分扼要害明間諜守關隘斷橋開塹斬木塞途㸃集民兵激勸隅總諭以保鄉井守室廬全妻子搜補親兵日加訓閲時外邑警報狎至人心大恐郡僚欲張皇陳利害公不為動既而橫岡桂嶼相繼以捷聞招捕司遣統領官齊敏率大軍由漳趨潮截贛冦餘黨公呼敏諭之曰兵法攻瑕今鍾冦將窮陳冦猖獗若先破鍾則陳不戰擒矣敏惟命公調民兵為先導敏以部軍踵進搗其巢穴殱渠魁宥支黨三槍旋亦授首江西餘醜蕩平方未解嚴時有行旅數輩隅總搜其裝多黃白指為賊黨公疑而詰之乃梅鄉人嘗販牛潮陽援邸舍翁以為證公立追問如其言遂還資槖佐以歸費皆羅拜咸泣去始人疑公儒者不嫺戎事及見公區處事宜分别齊民靜練雍容莫不嘆服僚屬請上功公曰守職扞城保民何功之云距州六七十里地名山斜猺人所聚自耕土田不納官賦禁卒與閧公平决之其酋感恱率父老鳴缶擊筒踴躍詣郡謝公在潮恩惠孚浹去之日闔郡遮道攀送端平初召除禮部郎官因登對上謂公曰卿治潮有聲與李宗勉治台齊名公曰民無不可化顧牧民者何如耳臣治州幸免曠瘝皆陛下德化所暨臣非曰能之除兼榮文恭王府教授力辭除國子司業時徐公僑為祭酒議學校差職欲先譽望公曰譽望固可得人然今之挾濶扁而求者皆譽望也不若差以資格資格一定則僥幸之門杜而造請之風息徐公以為然時有憑勢干職者公力却之行之以公人無異議時至諸齊誨生徒以勉學行兼權直舍人除國子祭酒攝吏部侍郎外恕內明吏不能欺邑子嘗請那移闕次公曰有法在兼學士院權直是日明禋肆赦甫竣事學士院賫御筆不許辭免宣押至院中使出宸翰罷鄭清之喬行簡相獨相崔公與之俾草三麻文成如宿製次日文德殿宣布畢上遣中使召公公頓首謝上曰草制甚善公復謝曰臣聞昔人有言進人若將加諸膝退人若將墜諸淵臣今草制述二相乞罷機政與陛下體貌大臣之意庶幾君相之美兩盡上曰卿言善就令草勑書戒諭諸閫權吏部侍郎兼侍講兼權直學士院嘉熙丁酉春試吏部侍郎升侍讀權兵部尚書時楮弊折閲甚喬丞相主行稱提之說州縣希㫖奉承貧富交相猜懼公奏從民便節用二說喬亟相然之奏只令五路提刑分任責兼吏部尚書差同知貢舉丞相游公似范丞相鍾並命觀者如堵號主司得人一時所取又皆老成知名之士除兵部尚書兼中書舍人三上章丐外不允兼給事中兼吏部尚書請外㫖免兼中書御筆除端明殿學士僉樞密院事公以足疾不便拜跪亟欲丐去除大禮鹵簿使黽勉就職恭謝畢即五疏丐外㑹正言郭公磊卿亦有論疏筆遂除端明殿學士提舉洞霄歸第徜徉奉祠凡十載頥養精健精力不减年少屬痰涎作竟至大故享年八十一上聞輟朝一日積階至中大夫致仕特贈大中大夫遺表上贈資政殿學士銀青光祿大夫公風貌偉重襟度粹夷立朝不躁不競不激不隨不妄薦士而亦無傷人害物之事自掌故至為郎十有五年而淡然無進取志晚由兩制登宥府是雖翰墨䇿勛然亦守潮日治最可紀也黃霸功名起於治郡公其似之娶張氏封魏郡夫人福國之姪男二人嵩承事郎監溫州在城商稅先公七年卒峻承奉郎主管兵户部架閣孫男純仁承務郎銘曰為甲科郎早擅詞章淡於進取館閣徜徉更出迭入來自潮陽一夕三麻遂躋玉堂紫薇青瑣法從文昌何天之衢闊步髙驤亦既宥府歸歟故鄉寡欲無營深關退藏匪名匪利清健未央薨訃流聞枌梓痛傷尚有典刑無復堂堂於何式之東山之岡墓志提刑鄭吏部墓志銘吏部郎鄭伯昌莆田陳公寺丞宓之侄女壻也淳祐戊申夏五月十一日歿其孤至奉其喪窆於懷安縣之南溆泣血志壙表墓而又謁銘於豫三四年不輟曰不得是他日無以見先人地下余曰有子顯親足矣又假豫言耶然每記端平初一時收招史彌逺所排擯之諸賢號為更始而宰相鄭清之輕躁沾沾喜功利易楮履畝開邊汰卒政令騷然外招邊釁內召卒閧下召民怨子弟用事賄道漸開搢紳奏疏但痛詆寶紹間彌逺之失而無有敢言時政之弊惟蜀士劉寺簿震孫登對首疵之伯昌繼之曰進退人材宰相職爾人言藉藉謂出家庭其後國政湯公中以封事痛斥清之聲振朝野無小大愚智皆偉湯而不知劉與伯昌為之先也是非可書之大者乎謹按伯昌名逢辰世為福之閩邑人曽大父煥故纍贈太師益國公妣徐氏贈益國夫人祖圭故贈太師兖國公妣林氏贈兖國夫人考昭先知樞密院兼參知政事觀文殿學士纍贈太師諡文靖妣黃氏贈吳國夫人伯昌性至孝兒時刲股療親筮仕浙東帥機未上改西外睦宗院丁吳國憂又丁知院憂服闋又連為本生父母申心制端平初除將作監簿繼除司農丞大宗丞金部郎官每登對與投匭見謂敢言一日因監長蔣峴與同官㑹食謂孔子誅少正卯非是伯昌退而議笑之峴聞而不悅既而峴除殿中侍御史㑹伯昌登對言稍訐遂劾伯昌去未幾都承王公伯大入對二疏尤切直天下誦之亦為峴劾去人稱知院得子壻之賢淳祐初伯昌得堂禀繼知衢州修學校寬征斂時史嵩之當國其皂𨽻包輸楮皮為五邑害伯昌數其罪而黥之有賢能聲推官馮惟悅才而賢伯昌以京狀與之察院劉晉之劾馮惟悅贓汚惟悅不受誣賦古風書印厯去伯昌嘉嘆而和其韻奏乞坐謬舉之罰且為之辨晉之復劾伯昌去徐刑使鹿卿嘉伯昌之去復和惟悅詩旋又為晉之劾去搢紳傳以為盛事其後嵩之以經營起復罷相相范鍾與杜公範諸賢盡起伯昌得江西常平使者首劾戚里廬陵守王克謙時論偉之旴冦發守王侑告急伯昌以便冝從事調發撫軍勦捕宋刑使慈又調將王舜截冦入南路兩軍夾擊冦勢窮密約寧都隅總謝元為內應陽許之告王舜兩軍設伏以待賊至大發大破之宋旋為臺臣劾去伯昌得刑使其後郴冦作迫江西界朝㫖復委伯昌討捕其時雩都冦又作伯昌盡瘁區畫聲威不减為常平使時其後江湖帥皆召伯昌亦召為吏部郎改浙東憲甫歸枌梓而疾不起矣悲夫初娶李復娶陳皆封宜人男三人長至迪功郎充福建安撫使凖備差遣次基以祖澤授承務郎季庾受遺澤豫每怪伯昌生長富貴之家居鄉泛愛無小大皆得其心而能立朝遇事敢言奮發不避蓋其師慕陳公寺丞之為人每謂豫曰某為丞相正獻公家壻一幸也親炙寺丞二幸也伯昌因寺丞益喜親師友招致楊君復至仁時執經而取正焉然則士夫可無聞見之漸歟伯昌為家令子為國讜臣使假以歲年益淬厲于學問則其所成就又有大於此者悲夫銘曰莆正獻家得壻多良猗鄭公鑑論事激昂英氣凛然不朽令芳尚有遺風怡山伯昌惜正盛年未大施張每過南溆為之惻傷生愛子文歿發其光陳平甫墓志銘豫少從先君子太中宦游湖湘時外大祖莆田陳丞相正獻公之從子審為船場嗜書博古與衆落落太中每指謂豫曰此爾母之從伯父才高志介而不偶於時小子識之後十五年豫客行都識船場之子平甫又六年與都􅊰楊君復皆客豫寓寺鍾山相與為忘年交平甫豫再從舅情好尤稔每青燈相對商國史至夜分既而豫去為金陵征吏宦於朝平甫老於閩不出其後豫持憲節江左時湯國正中家著作郎􅀈陳架閣髙子湯史校漢饒都􅊰魯老成名俊皆在或貽書或命駕談辨名理終日甚思欲一屈吾平甫不果未幾改守金華忽平甫之子君選泣血走書來請平甫志銘豫始而愕中而悲末而悽惋不得與平甫一盍簮也又六年歸里君選偕弟璪凡三歲而三自莆陽至請益力遂為之屬筆謹按平甫字也名均贈太師冀國公詵其曽祖也贈朝奉大夫正卿其祖也少力學請鄉舉益刻厲自奮中年慕尚義理之學蓋正獻公丞相長子參議實有東漢陳太丘之風次子匠監守次子承事定皆從文公游而承事尤力於學早卒其次子寺丞宓師黃文肅公幹尚友潘君柄平甫濡染家世見聞日久又周旋寺丞之側時時親炙潘君故於義利理欲之際尤别白寺丞在嘉定乙亥丙子間立朝有直聲多平甫贊之人謂平甫為寺丞時田承君方彌逺擅國以爵祿柔天下士夫能言者極少寺丞持孤喙嬰羣鋒都曹胡矩薛極輩力擠之彌逺亦欲害之賴寧皇容受不敢寺丞戴寧皇如天之恩甲申聞遺詔嗚咽流涕不勝攀龍髯之痛力祈謝事不得請改除廣東憲不就平甫與寺丞志好塤篪當對大廷亦辭太學歸里著皇朝舉要備要二書效朱文公通鑑綱目書法端平初鄭元樞性之為之奏聞有㫖令送上官郡將楊夢信至其家索之平甫辭强之自携藁至郡郡聞於連帥録以進既而旌以官辭不受只稱前太學生人謂寺丞平甫倣佛漢疏廣受父子氣象其後郡將楊編修棟下車首訪平甫起以儀鄉泮力辭不獲深衣大帶從楊編修一至平甫周旋鄭元樞之門凡三十年著書多資其力成名亦階之暮年勉為一出卒於三山年七十一待子至而殮六日容色如生元樞極力周其身後平甫為人淳篤清苦聞義必為嗜學不倦自號純齊或謂寺丞以紈袴膏粱而植立易平甫以韋布空乏而植立難雖然是以跡論二人篤志於善則同也配薛氏先平甫歿合葬於莆田縣山之原男三人長君選國子進士次璪國子進士次琬女三人長適留寀次適鄭一龍次適留矩孫男三人必學必達必强豫嘗狀寺丞之行矣於平甫能無銘乎銘曰士而成名豈必公卿豫謂平甫可書汗青銘之匪私以勸義榮有過其鄉當式其塋陳提舉墓志銘淳祐癸卯豫為江東刑使甫至番陽史校湯君漢携文一通示豫曰偉哉疏也庸齊見之乎豫曰何疏視之則舅氏陳寺丞因雷變封事攻史嵩之者豫曰可以踵其父復齊旱疏漢曰是切直過其父逺甚且曰無有三世能以直聲著者福公有後矣後六年寺丞為廣東庾使歿於官其子瓉與其壻李務觀泣再拜請銘其墓者三年余曰是有雷變封事攻時相大節可書他可略也謹按舅氏名圭字表夫世為莆田人奉直大夫太府丞贈直龍圖閣宓之子少師觀文殿大學士兖國正獻俊卿之孫太師吳國公詵之曽孫母梁氏繼母龔氏並封冝人表夫少而靖願未為父所知長染濡父學問日益警敏以祖澤授承務郎筮仕淮西總所排岸再調泉州南安丞知福州長樂縣丁父憂再丁繼母龔氏憂端平初有㫖旌復齊之直令守臣親祠其墓升擢表夫差提轄行在𣙜貨務除將作監簿除軍器監丞除大理丞差知漳州辛丑冬召除外府丞壬寅冬雷發非時人皆知咎嵩之而莫有敢言者表夫獨上封事曰冬至之日上天震怒無雲物可書之祥有雷電交作之異蓋廟堂獨運於深算公議上壅於聖聰執政取易制之人間能自拔則輒懷顧忌侍從多黨同之士少或立異則罕見優容至於臺諫者天子耳目之官薦進多主於大臣擢用鮮出於聖意除目之未播輒先受其私恩白簡之既升率多承其風㫖屈原曰豈不鬱陶而思君兮君之門以九重猛犬狺狺而迎吠兮關梁閉而不通士夫怨怒陛下不及知故天悟以震怒之威大臣號為通兵法陛下悉付以邊防制閫之易命未幾強敵之雄心已啓屠寶應一邑而填於河塹者以巨萬計潰通川一壘而殞於鋒鏑者亦數萬人暴骨長城之下頭顱相屬於道人死如麻誰復顧念記曰國亡大縣邑公卿大夫士免冠而哭於太廟三日君不舉今所亡非一縣邑而陛下端拱於穆清大臣安處於廟堂民之殃禍若不聞知民心怨怒陛下不及知故天悟以震怒之威自督府之功賞不行於入相之後而江淮諸屯莫不咎朝廷之失信自揆府之鹽價頓穹於輿臺之手而京師莫不議朝廷之規利鹽價增長而劵錢折閲則生計病於無聊功賞並廢而華要日遷則戰士不能無望悖氣橫胸憤口誹謗反側不安如懷私讐以至姦宄竊發於祠廟者有之奔潰散出於鄰境者有之或謀舉孤城而內應或勇為敵國之前驅禍本亂芽孰大於此軍心又怨怒而陛下不知故天悟以震怒之威陛下必欲消弭天變舉漢以來䇿免大臣故事聽其求去庶幾人心說而天意解嵩之不悅明年遷大理正又明年遷大宗丞表夫丐去力差知潮州至州首以訪民疾苦為急凡互送風宜對折重破等例縻公家緡錢者痛禁絶之悉樁外庫以助公費蠲租弛負鋤奸擊强親儒講學一守復齊家法丐祠得請主管台州崇道觀齊民惜之丁未除廣東庾使痛革貪弊未幾以病卒戊申年七月也公娶某氏繼娶趙氏司直司夏之女先表夫卒子一人瓉將仕郎女二人長適具位李務觀次適具位趙希孟某月日葬於某山之原豫謂士大夫植立天地間豈獨以一二善然能居朝以直蒞官以亷是亦可以勵末俗也表夫以亷直自植立不墜其先使縉紳流傳曰是能肖正獻復齊者也可無銘乎銘曰惟正獻公見謂清忠名子名孫尚有餘風我陳氏出銘其幽宫豈私發潜以勵匪躬子將仕崇堂墓志銘趙崇堂字肯夫家世汴今為閩之三山人庸齊汝騰之子也母碩人鄭氏崇堂生有異質眉如畫風度軼常童趙南塘酷愛之病劇撫之而瞑目讀書五行俱下記誦如流不好嬉弄應對警敏侍父草玉堂詔皆曉大意得守溫州碩人病歿於杭之西湖崇堂哀甚碩人斂其乳母抱之他不使視翌早雨甚至哭指雲間曰見吾母過冠甚側問婢輩皆曰斂時冠誠然吳凖齊如愚入弔聞之曰此孝感也坐苫讀孝經哭誦見者為之泣下父為江東憲公餘約陳君髙子饒君魯湯君漢談辨終日崇堂從旁拱聽間質疑難於三人皆器之曰逺到也為詩清絶多警句賦釣臺云船帆竟日趨名利山水中間著釣臺賦月巖云色即是空空是色其英拔如此學賦驟進聞饒君魯之言遂亹亹於朱文公語孟等書嘗曰張宣公何人有為亦若是居母喪盡禮踰成人服闋以父郊恩奏將仕郎友愛從兄崇坌特至自其死後悽惻甚未幾感寒疾更數醫微愈㑹父改守婺挈之而行至婺十日證遂不可療談笑而逝紹定庚寅四月二十七日生於金陵征官之賃舍淳祐甲辰六月二十八日歿於婺之郡齊年十有五父哭之幾不聊生侍郎徐公元杰聞而慟失聲饒君魯書來曰此程純公所謂得氣之精一而數之局者也男二人長必曅登仕郎次必景父晚年歸家山溫燖故書間亦輯一二說以授學者每起童烏不與我𤣥之嘆悲夫崇堂歿之八年始得地於吾州葛琦之珠墩冨沙司直張公毅然擇也定坐向者秦溪楊君克以辛亥三月朔日葬銘曰疇昔道路致爾大故痛倍昌黎志女拿墓嬴博之間非爾家山珠墩首丘卜利且安朱夫人墓志銘東巖趙公彥後為三山名宗室趣尚儒雅風致高潔學詩逼杜少陵陳后山學書逼王羲獻所至又庶幾宣秉王良之清操豫每樂道其為人其次子計院瑻夫以公墓道之碑來請豫諾之未暇也其季子主簿夫以事來曰先兄所請先公墓碑差可緩夫不孝罪延母夫人朱氏於今年仲春晦日歿葬日迫先丐銘以納諸壙又曰母朱氏事父母孝甚外祖母杜氏嘗疾劇母露禱减紀一算刲肝至再和糜以進杜氏立愈延十有二年亡之日與露禱之日合此孝感也宜得直筆以詔後豫為之竦然曰是與東巖法皆得書按夫人諱妙真永陽人也曽大父廷傑故濰州通守贈朝議大夫大父明叔故宣議郎父用康故不仕夫人早慧及笄配于東巖事姑文安夫人盡孝東巖官未達萬里入蜀夫人從之備嘗艱苦洎出蜀改秩宰安溪督左帑貧益甚遭煩言亟出修門囊空乏無以歸浮家寓霅溪士友多之尤多夫人之善處貧約其後東巖宦寖達厯使湖湘夫婦偕老子璱夫瑻夫相繼取名第簮裳娛侍宗黨姻戚皆榮之未幾東巖歿夫人哭喪明服闋二子相繼改秩擊鮮更養季子夫亦銓中入仕亦足少慰夫人矣既而長子歿於新喻次子自延平歸又歿獨餘季子在人又莫不悲夫人享高年觸惡景嘆夫夭壽不齊慶弔靡常此人世之所有也其悲其樂豈人之所能自必捐生以療其親攻苦以佐其夫是則人之所難者蓋有禆於人道之大三復夫人志行豈不足以勉世之為人妻者乎生於乾道戊子歿於淳祐辛亥年八十四纍封至宜人男三人璱夫故宣教郎新喻宰瑻夫故奉議郎南劍守夫迪功郎崇安簿女三人長適承信郎連江稅蔡應孫次適儒林郎瀧水令杜功卓次適進士黃汝霖孫男七人時淦故迪功郎南海尉時􅀈時瀧時㴐時㶎時浯時澰孫女二人長許嫁將仕郎沈逢辰次未笄曽孫男一人曽孫女四人夫卜以是年四月十二日與東巖合葬於懷安縣靈運里桐溪之原銘曰東巖英英食蘖飲冰夫人佐之遂其亷稱鳯耦其凰並穴桐岡所寶不貪子孫勿忘卓氏墓志銘舊掾王耕以書走價至三山告豫曰耕不孝殞其繼母丐先生一言以銘之耕死且不憾矣豫惟昔者履霜之操尹吉甫繼娶子不見而作也子之母信賢矣夫子之請拳拳則又俱賢矣志之以勉來者不亦可乎謹按夫人卓氏世為台州黃岩人曽大父某大父某父某皆隱德弗耀王君居仁先室林氏生耕及六女中道歿繼室夫人生􅀈畘及二女夫人撫諸子均一無前後之間也王君先夫人二十四年歿諸子得所恃而成立慈順柔良殖禮嗜善待宗族親戚雍而睦御婢僕肅而溫鄉閭敬而稱之生於乾道之壬辰歿於淳祐之已酉以次年八月庚申與王君林氏合葬於小溪之原男三人長從事郎前常州軍事判官耕次􅀈先夫人七年卒次畘女八人適滕嶽吳森陳鼒項濤項熊姚元章戴宗道一學浮屠為尼孫男六鍈鈶鎜鉉釙冲孫女四尚幼銘曰其心一兮其人吉兮來者式兮
