body:
  text: 庸齋集巻三宋趙汝騰撰表寳祐改元賀表必世後仁聿思新治更元發號率由舊章無疆惟休有截稱慶中賀恭惟皇帝陛下立中居正聰徳思恭紹開寳之宸謨興起百度體嘉祐之聖徳扶植衆賢取以表年監于成憲臣勉膺郡命猶在里居陪宿老以扶藜獲觀溫詔指輔藩而問戍行布寛恩皇子進封忠王賀表大君有命元子進封邦家榮懐海宇慶抃中賀臣聞植宗藩所以開聖緒加位號所以塞衆心若天禧繇夀春而畀昇如治平自淮陽而更頴肆在今日率由舊章恭惟皇帝陛下堯智如神文謨垂後以天下為大噐強本尚親進地圗具禮儀分茅建國頃勝衣既賜履於潛邸兹重冠爰躋爵於真王星連參井之輝祚等箕翼之夀臣猥叨保鄣遥睇觚稜誦漢制廟立之詞與父老而同喜陳賈誼習貫之疏祈左右之皆賢天基節賀表太簇應於孟春虹流紀瑞神䇿増于甲子虎拜馳忱無疆惟休有截稱慶中賀恭惟皇帝陛下聰明時乂問學日躋總􅄃權綱法乾旋坤轉之妙舉錯直枉洞隂闔陽開之機茂迎震夙之辰益衍簡穰之貺臣猥縻漢障遥想兕觴近天子光知仰瞻於皇極祝聖人夀更申頌以多男天基節賀表太簇為生物之津祥開電繞甲子増授帝之筴祝效嵩呼萬年無疆四方來賀中賀恭惟皇帝陛下聰明時乂齊聖日躋以清静治邦家至仁無欲以忠厚待臣庶大徳曰生夀與天而比崇福如川之方至臣身縻符竹目遡觚稜昔殿中綴班曾預兕觴之列今海濵上表遥伸虎拜之恭天基節賀表頒厯更元杓攜龍角建極居五節紀虹流喜溢乾坤頌形海㝢中賀恭惟皇帝陛下聰明時乂剛健日新徳廣曰生收必世後仁之效業垂可乆為詒謀燕翼之思瑞應河清福如川至臣勉膺符竹尚伏田閭奉漢玉巵遥想嵩呼之盛上唐金鑑俯伸華祝之忱天基節賀表聖與天而比崇應乾九五筴授帝而在甲為春八千祉輯端門頌形寰宇中賀恭惟皇帝陛下聰明時乂剛健日新好生之徳洽民推仁宥罪不殺之武定業以善勝殘瑞紀星虹壽齊箕翼臣猥縻漢障阻造周行成天慶以垂基恭想兕觴之奉揚王休而稽首敬賡虎拜之歌天基節賀表帝撫五辰生於甲子天錫萬壽對此春祺一人尊榮四海慶抃中賀恭惟皇帝陛下齊莊有敬溥博無私化久而成能盡體常之道澤潤而洽既踰必世之仁節紀虹流福如川至臣猥叨禁從屬領麾符望魏闕金雀之棲莫躋舞蹈想漢班玉巵之奉遥寓頌祈天基節賀表星渚呈祥先春三日華封伸祝後天萬年無疆惟休有截稱慶中賀恭惟皇帝陛下聰明時乂緝熈月將以博施濟衆為心好生不殺以皇受建極為念立賢無方用迎神筴之増益迓聖圗之逺臣分符輔郡遡目清都聲效嵩呼阻簉班於北闕光寒斗口遥馳頌於南山元正賀表開嵗五日光昭華渚之星為春八千増受㤗元之筴懽均有截慶輯無疆中賀恭惟皇帝陛下法式生知淵泉時出體信達順洊令穡寳之告豐去殺勝殘坐底邊塵之不聳齊大年於箕翼等盛烈於山河臣猥使周原阻班漢陛莫簉兕觥之稱壽隃效嵩呼益廣舜徳之好生仰伸華祝皇太子冠禮賀表震為主器肇錫真王筮重賔儀始加元服光前令典有截歡聲中賀臣聞燕翼子所以昭聖謨敬嘉事所以為國夲在昔祥符之盛際嘗有夀春之舊章冠禮舉於戊寅册封見於辛夘曠彌文之乆墜喜今日之復行恭惟皇帝陛下從諫轉圜以身為度謂皇子賴天趨拜乆矣勝衣命醴辭令月薦芳俾之受弁元良以正三加彌尊臣濫任承流阻儕醮酒莫效晏殊之獻賦以遇賛揚願選馮元之講經俾精教導明堂慶成賀表郊之言禋類於上帝廟焉而饗祫于先王禮既熈成神亦歡洽中賀恭惟皇帝陛下嚴恭自度聖敬日躋蠖濩儲精肅平居之對越齊莊奉幣舉大報之親祠后皇愉臨祖考來燕驗豐融之肸蠁肇砰隠之休嘉臣濵海分符望雲拜詔駿奔執豆阻陪多士之恭獸獲若麟遥想有司之薦明堂賀表祀修美報禮極熈成乾坤清寧海㝢懽洽中賀恭惟皇帝陛下嚴恭自度聖敬日躋雅聲逺揚廟焉而親饗令芳嘉薦郊焉而帝臨既格一純咸來百順臣猥居槃澗遥睇清壇誦伊嘏之詩莫預奉璋之髦士效祝釐之禱仰祈錫福于庶民明堂禮成賀表嚴父莫大於配天於昭孝奏惟聖斯為能享帝丕顯休成兩間薦辛四海稱慶中賀恭惟皇帝陛下寅畏自度祗敬不違先甲齋居八神警蹕季秋羙報百物迪嘗欽柴之禮既竣蓼蕭之澤斯溥臣猥司保障遥睇觚稜歌清廟相祀之詩阻陪奔走賡明堂孔陽之頌仰賛緝熈聖製忠邪辨謝表知人則哲惟帝其難聽予作猷曰王不慝凛若春秋之筆粲然星斗之芒中謝竊惟為臣之義不同事君之忠則一諫有直有婉而要歸於責難陳善仕或去或隠而必揆以立懦亷頑堪猛望之均於徇公滂膺徐穉皆為合道必因其跡以遡其心恭惟皇帝陛下修已任賢尊帝籲俊舉伊尹不仁者逺上智如湯去驩兜何畏孔壬大功同舜崇奬蹇蹇匪躬之節作成諤諤犯顔之風自端平甲午更化而浚其原迨淳祐乙已改紀而振其響凡縉紳錙銖之善皆天地覆載而成公議流通士氣昌盛近者間隣於激訐乃致小厭其紛紜聖謨洋洋雲章炳炳刻琬琰以示下期防範而歸中煥乎龍驤鳯翥之文赫然魚躍鳶飛之造臣祗拜教令敬佩韋弦因思人主一心攻者甚衆臣下萬態辨之實艱惡紫亂朱固當審售偽假真之病因噎廢食或恐貽以精失士之憂盖國將興必樂骨鯁之猷而人欲病先厭魚肉之味是以武帝踞視衛青之貴見汲黯則必冠太宗面折士及之諛指魏徴而為鑑洎我聖朝之家憲尤重天下之人言乾徳開基則取已壊地之疏而復行太平興國則擢能獻䇿之士於髙等真皇對劉沆而追思田錫仁祖劣蘧瑗而甚優史魚神廟敬光之為人至容其詆新法孝宗重熹之好學不惡其數辭官此宸意之所素明宜愚忠之以愛助后從諫而則聖以康于民臣有言而逆心必求諸道左右曰可而加察眎聽以衆而為公用臨照於百官斯迪知於九徳輒陳梗槩以佐緝熈賜御書蘭亭詩序謝表臣某言伏蒙聖慈以御書蘭亭詩序墨夲手巻一軸賜臣者伏以永和墨帖紀勝事於蘭亭淳祐奎書煥成文於寳殿飛從天際流布人間中謝恭惟皇帝陛下將聖多能娛神妙畫筆勢廹羲之之逸飄若游雲序文取孫綽之精光於南澗摹成一札賚及羣工臣緹襲不諼糜捐莫報茂林修禊隃想許李之諸賢暮春浴沂請誦泗洙之大道賜御製訓亷謹刑謝表聖有明謨深懲叨懫王不匿指昭示訓彛凡屬見聞皆知警勸中謝恭惟皇帝陛下作新治道戒飭臣工念下民之無辜困於貪墨惡大吏之棄法恣於凶殘肆筆二銘如綸一札俾永傳於琬琰以誕布於風雷臣祗拜奎文對揚宸命厲召南素絲之節益勉自公佩康誥赤子之言必思敬罰賜御製詩并香茶謝表臣某言伏䝉聖恩為經筵進講禮記終篇以臣嘗預侍立特賜御宸翰寳熏龍鳳茶者講親重席篇已竟於曲臺賞徧細氊勞亦旌於舊史恩華狎至眷施難酬中謝竊惟戴記之書雖出漢武之世要其奥義不離洙泗之㣲言至若宏綱猶有夏商之遺意復興經制全在聖明伏惟皇帝陛下寤寐斯文緝熈正學十六載討論之乆不替宸思前後儒聚辨之功遂終全帙其大者欲以彌綸斯世其精者則思追企先猷懋賞親行英髦悉逮以臣頃在侍立之列乃今亦叨錫賚之榮名馬膳羞照耀蓬蓽雲章香茗華飾丘園莫殫報稱之私爰寓賛羙之頌伏願養清明在躬之徳收中和育物之功篤信儒行之言立推經解之教守内則以肅宫掖訂大傳以建夲支杜不仁而純向仁人戒不善而專意善道臣由衷懇切愛助勤拳蒹葭蒼蒼益堅用周禮之治淵泉浩浩更祈達天徳之施臣無任感天荷聖激切屏營之至宣賜厯日謝表聖朝作厯敬授人時侯國頒春對揚帝訓恪恭拜賜兢業承流中謝恭惟皇帝陛下奉三無私建五皇極風雨霜露寓神教於慘舒嵗月日時成治功於法象以熈庶績用錫羣工臣敢不無忘憂勤所省耕斂布宣賔餞之命將以明民奉行寛大之書期於安俗宣賜厯日謝表后左右民茂明作厯守服肱郡叨拜成書祗命為榮承流有靦中謝恭惟皇帝陛下道參化育政夲隂陽憲天聰明泯識知而順則迎日推䇿嚴出納以授時課自清臺錫於方國臣敢不對揚休命宣布上恩亹亹治功雖分陰而亦惜孜孜農事冀有年之是圗宣賜厯日謝表大君治厯式重授時小臣觀風獲叨頒朔猥䝉齒命欣睹聲明中謝恭惟皇帝陛下徳合於乾道裁於泰體堯欽若之意仰察天文采夏小正之書聿成月令爰布宣於先甲以戒詔於羣工臣遥對龍光動稽靈憲飭部封之吏夜寐夙興厲原隰之農春耕秋斂宣賜厯日謝表元聖當陽萬年朌厯㣲臣乗障洊嵗受書翫愒増慚凌兢拜賜中謝恭惟皇帝陛下道函三極治撫五辰先天弗違既動與於易準迎日而䇿又祗命於司存著為成編誕布方國臣尚兹宣化敬以授時誦夏小正之文劭農是急奉周始和之令率吏以勤宮祠謝表加職予祠聖恩隆甚辭名拜禄臣義當然􅐲地難勝望天隃謝中謝伏念臣疎無與比愚不可移頃綴周行不敢自營於身計每懐宗國所陳粗竭於心思遂積罪尤至煩吏議荷皇明之洞燭叨大徳之曰生於省愆念咎之中沐洗垢匿瑕之造正班學士錫廪殊庭真軼望於寵榮蓋莫難於避就思昔周以上卿待管仲仲拜下卿而還鄭以六邑賜國僑僑惟三邑之受此㣲臣勉奉祝釐之職而累牘祈收􅃉閣之恩盖進無貪榮而退不方命是謂得辭受之道其敢昧生成之原兹盖恭遇皇帝陛下以禮使臣推仁接下諒臣戇如汲黯在廷犯顔之時多念臣貧似真卿舉家食粥之日乆遂俾無功而禄不知何徳以酬尚勉桑榆之間跬歩弗離於學雖在畎畝之際一飯亦忠於君授寳章閣學士告謝表臣忱懇惻控免職名君命頻仍􅅷承天澤叨恩戰栗揆義忸怩中謝昔者臣光累牘而得允樞副之辭臣熹數疏而亦寢待制之錫是皆道徳黙有以感召雖出詔令至為之收回如臣么䯢與物扞格説大人則藐焉有是心謂明主可為少攄其藴積成愆咎果召簡書賴日月之照臨䝉乾坤之赦宥盡蠲罪垢驟畀光華以舊綴攝常伯之班特超朌真學士之職淵升之膝君父極力以扶持谷遷而喬臣子益懐於危懼祗奉釐庭之秩力避奎閣之榮天九重而蓋髙箋五上而莫遂屢煩睿訓覺淵聽之難回勉拜龍光視前修而有愧何止小言大禄不勝昔是今非兹蓋伏遇皇帝陛下隆禮尚賢體仁及下矜愚嘉善不欲以言而罪人售偽冀真惟恐以精而失士遂令疏逺曲被生成臣永矢弗諼有善則告兢兢履薄敢云日暮而少休拳拳攄忠不以身逺而有間御書建安書院四大字謝表宸章雲爛肇錫珍題聖敬日躋力扶絶學光躔精舍喜溢潛藩中謝竊以建安為英哲之邦朱熹續周程之學於皇翰墨昭掲源流恭惟皇帝陛下居寛行仁據徳游藝是道吾所謂道純一尚儒兹文所以為文雍容肆筆固聿榮於先覺實加惠於後來臣涓吉奉迎近光舞抃嘉與多士歌棫樸追琢之詩俾紹前修究淇澳切磋之業謝授龍圗閣學士知建寧府表勉承郡紱祗奉賛書榮渥増輝㣲蹤知懼中謝伏念臣初無它技粗有愚忠一言興邦若是其幾何敢黙也千里見王不遇故去豈所願哉進既無補於公朝退合自娱於槃澗曲䝉睿眷改畀潛藩頃待罪𤨏闈嘗為生靈而請命兹分符竹使敢諉凋瘵而辭行視篆以來撫字是務然而帑庾赤立事力殫㣲初至旱魃為災加以蒲澤多警仰藉皇明之威徳旋安田里之歎愁刀劒日銷雨暘時若惟是環顧諸賢之家食獨容一叟之空餐對旗旄而不勝汗顔誦絲綸而益深芒背晉峻老龍之秩加隆半虎之權爛然昭回天為章下飾物凜乎跼蹐朝受命夕飲氷兹蓋恭遇皇帝陛下臨照百官體貌羣下守紫雲樓之訓簡注藩侯戒白駒場之詩縶維賢士遂令衰朽獲拜恩華臣敢不益勉布宣力圗報稱訪民間之疾苦豈特使寛於一分計宗國之安榮早願旁徠於衆正知建寧府謝到任表自天殊渥易地潛藩頃任以左馮不欲其逺去國今錫兹名壤特寵之使便家曲為臣謀莫報上徳中謝伏念臣迂無足採愚不可移束髪讀書固已明義利之畛白首造闕何敢萌福禍之心况明主可為忠言必更化乃克善治且職居於封駁遂力辨於忠邪詎謂方當官而行已坐不得言而去積䜛諛之擠䧟賴仁聖之扶持諭留行至再三趣領鎮凡數四繼上引嫌之牘旋叨改命之除惟外大祖正獻臣浚卿與先大父吏部臣不敵皆於乾道出守建安藐是孫枝續茲棠䕃力循墻而控免䝉頒詔已弗俞奨其有汲黯之風諭其以朱熹為法適洪水懐襄之後豈臣子所敢固辭當諸賢隠遁之時在屬籍不應堅卧勉為吾君而一出既以上意而具宣惟是牧牛羊者當為之求芻集鴻鴈者必使之安宅察臣區畫以次條陳兹盖伏遇皇帝陛下寤寐黎元宵旰治道謂臣赤心殉國不自榮身容臣純意為民頗知竭力閔此方之凋瘵付綿質以撫摩臣敢不恭佩訓詞聿嚴條教心求之若保赤子斷不負聖經之言天生斯而覺後知亦思振儒先之學授兼侍讀告謝表臣某言伏奉告命授臣兼侍讀者臣邱園之迹重侍鈞天畎畝之忠獲披廣厦叨恩稠疊拜命凌兢中謝思昔儒紳再為侍讀其在元祐之際獨有蘇軾之除孰謂非才乃膺是選伏念臣粗知忠鯁見謂迂愚頃年折五鹿之奸旋遭言去元日覩羣龍之用獲預彚征擔簦未近於神畿除目已朌於經幄日月不棄螢爝滄溟下取涓流而臣乆從諸生瓠葉之盟乃復得綴更化金華之講簉鴛鸞而忻幸覺麋鹿之怔營兹葢恭遇皇帝陛下從諫如流見善若决天資神聖羣䇿莫望於清光學力緝熈多聞更加於遜志亦令衰朽俾竟講劘臣敢不益浚新知上承顧問是道即周孔之道誦昔所聞吾君為堯舜之君乃臣所願臣無任感天荷聖激切屏營之至侍讀謝告表進講無功侍言有命莫回淵聽勉拜訓辭中謝竊惟邇英最重勸讀凡朝紳皆榮此選雖宰執亦居是官厥今李韶以舊翰林游佀以前揆路一則岷峨之老而問學之正一則閩嶠之擢而識見之高然而韶則累召而卧家佀已踰年而歸第曽謂異數猥及愚臣伏念臣蹇淺妄庸迂疎退惰初無講貫豈能窺河南龍門二程之緒餘何有開陳每深愧太末建安兩徐之風骨年餘殿幄日覲宸光雖粗通於上世雅誥奥義之文豈盡析於大學聖經賢傳之㫖是以前奏犯顔以儒林四臣致請後牘忘分以考亭諸生為言温詔曲朌俞音竟閟屬預駿犇之列難遂牢辭之悰出使者於大門是則不敢綴明師於廣厦益重懐慚兹蓋恭遇皇帝陛下以虛受人謹㣲接下知臣不忘少時受詩之習俾在細旃念臣久立正座自講之隅又加重席臣敢不益温舊業仰荅殊恩王庶幾改之亦欲少行於臣學政不足間也所期上格於君心知婺州謝到任表躋之奎閣畀以輔藩君恩至隆臣質奚稱中謝竊惟寳婺宻拱清都地望則甚髙天聽則孔邇上徳意易以下達下疾瘼便於上聞於兹承流庶幾行志臣愚加之拙鈍濟以迂愚嘗使直廬甚乏陸贄韓愈之詞筆繼令出守又愧元結陽城之政聲比叨司臬之除謹體好生之念然而風裁素乏霜采莫揚擬及考以丐閒誤聼恩而易鎮踵公卿重臣之選游義理大儒之鄉望不及焉榮亦甚矣惟是值氷雹之後困矣黎元積綾羅之征殫哉物力若但以繭絲為職業弗知盡芻牧之勤勞雖能得民財而不能得其心豈足為聖朝之報欲無負天子而亦無負所學必兼為邦夲之思要於輕重緩急之間而當抑揚弛張之舉豈應庸懦可課循良兹蓋恭遇皇帝陛下視民如傷求士若渇謂臣碌碌難強以趨事赴功之才察臣孜孜或能守節用愛人之訓遂叨選使仍被趨行臣祗見編氓敬宣美化審先務而為政焉敢專俗吏之催科有餘力則學文當俾紹先賢之統緒温州到任謝表駑伎無堪力辭詞直龍光過厚躐畀輔藩既見吏民且宣徳意中謝伏念臣稟資戅拙觸事迂疎從魯兩生嘗粗窺於樸學辱漢諸老廼競譽其能言遭逄聖時塵滓翰苑上有動老癃之實臣筆弱不善發明上有服武夫之神臣思滯莫能寫状然且嵗縻廩粟日汚班行實􅐲地以靡皇數籲天而求去過䝉睿簡更付名麾自王謝以來已號山水佳麗之郡迨周程而後又為師友淵源之鄉獨是邇年大異昔者閭閻困瘁幾不聊生庾帑空虛殆無以立使能吏猶為束手縱賢者未易承流豈伊孱庸乃俾負荷兹蓋恭遇皇帝陛下推仁養士以禮使臣念其殫視草之勞粗諳宸慮責以盡求芻之牧必得民情迨其臨遣之時詳以撫摩之訓臣敢不夙宵竭力氷蘗持身對揚天光扶赤子之氣脉崇尚風化植前修之緒餘權吏部侍郎謝告表擢從柱史攝貳吏銓位寘超躋恩華莫稱中謝竊惟西清之秩實為邇列之聮淳熈大儒如張栻朱熹積盛名不登兹選近世宗老若汝談彦悈亦皓首方居是官曽謂么麽乃叨陵躐伏念臣迂愚而僻踈拙且庸外之無惠養澄清之勞聲績見謂陸陸内之乏文墨論議之譽建明不過平平已徧歴於兩螭更峻升於一武以闒茸尾荷槖之後以空虛當藻鏡之司由濁而清易右而左矧大化調琴之日而衆正征彚之辰固得盡觀天下之豪英或可助國獨恨略無胷中之尺度何以知人任匪所堪處尤非據莫遂循墻之避益深負乗之慙兹盖伏遇皇帝陛下器使時髦力收名俊付太宰以八柄詔王之任既不輕於進退之間畀常伯以四曹總判之權又使詳於綜核之際察臣粗諳武選之事假臣承乏文部之衡顧乃責以裁量不暇計其譾薄臣莫知報稱惟竭公忠守道不如守官固安敢以廢法舉善是為舉類亦時效於掄材吏部侍郎謝告表正從掌銓君恩過渥巽函盈篋臣罪當誅既黽勉以祇榮敢稽遲而叙謝中謝竊惟辭遜者臣子之大節愛護者帝王之至仁强司馬光入翰林怒其拜而未受之慢趣呂公著就學士至有徐而勿廹之言此烈祖以厚於士風而㣲臣乃遇於今日伏念臣迂愚自信鈍拙無竒非有建明之寸長乆汚班列徒抱忠忱之一片上對穹蒼謂明主可與盡言故在廷數至妄發偶因丐去適㑹得遷十數揆義以固辭前後被㫖而不允然物議猶責其當去在臣心欲受以何繇金華之控避勤拳玉音之勸勉諄篤以至為選吉日以供職再遣大璫而傳言而臣猶恐犯衆多之譏厥後遂更積遷延之咎若稽前代當在禦魑魅之科獨賴睿慈每為霽雷霆之怒近因臣方叔屢以聖語而催督遂同臣尤焴三思君命以彷徨真無地以自容共牋天而擬拜期以臈朔仍匄叢祠講次復覲於威顔趣就又厪於宸㫖甚孤始願何敢終辭兹盖恭遇皇帝陛下聖度海涵皇明日照察臣悃愊但欲全禮義之維容臣徘徊遂少白羞惡之志敢食大信恭被明綸朝受命而夕飲氷中懐愧報詩考槃而人在澗早冀生成權工部尚書謝告表已酉二月二十七日權從銓貳攝長起曹位置頓超恩榮莫稱中謝竊惟工必信度是惟禮義之時技亦咸精足彰綜核之世能諌苑囿官室則可以禆示樸知備車馬器械則庶乎佐中興司存雖號於清閒事典實關於理亂使綴常伯必惟英材伏念臣見謂庸凡自信愚拙僅能守昔人之糟粕莫悟斵輪徒有憂宗國之忠忱遑思卹緯再歸班列乆汙髙華一毫無補於朝家累牘祈閒於里閈忽膺奎筆叨假冬卿在昔太宗之明以旌大亮之直曽是乏論思之益乃遽塵喉舌之聨旁觀交指於維鵜自懼殆同於樂鷃再命而僂三命而俯竟不獲以踰垣昔日受是今日受非盖豈勝其維谷兹盖恭遇皇帝陛下宰割萬字照臨百官謂臣學無愧于工師粗知不負察臣心勿忘於藝諫庻幾能言乃於新元有此親擢臣敢不俯堅素履仰答殊恩望山巔水涯之賢不無愧色在厦下旃上之際益勉忠規謝進開國伯加食邑表上朌祭澤丕徧羣工臣進爵封超躋三等鼎來殊渥祗拜明綸中謝伏念臣叨守潜藩奉行寛詔隃想欽哉之盛莫預駿奔猥該湛露之榮不遺馬走既七命以就伯復多邑以増腴亶惟僥踰有兹際遇此盖恭遇皇帝陛下以仁覆下歛福錫民謂多士奉璋相成祀事雖爾身在外亦布邦條爰錫恩徽益􅂭眷遇于以見聖心之公普子以示餕惠之周流臣沐浴生成糜捐報稱不稼而禾三百俯愧無功敬天之休萬年仰祈懋德明堂賜劄謝表中辛舉祀先甲敷言一劄宣傳四方懽動中謝恭惟皇帝陛下齊莊有敬視聴思恭事父孝故事天明聿嚴大報在宫雝則在廟肅預戒我將一哉王心告於臣下臣神馳極北迹滯周南肇禋迄用有成阻陪熈典無競不顯惟徳遥賦烈文
