body:
  text: 庸齋集巻一宋趙汝騰撰頌癸丑仲秋建安郡學丁奠退而作頌并勉同志之士頌曰建水懷襄孔殿巋然文未墜地道昭于天輪奐鼎新丁奠揭䖍肅肅冠佩粲粲豆籩惟聖立範載籍具傳渾渾噩噩書教百篇危微精一綱領所先詩六義教風雅頌全曰思無邪蔽以一言易教精微四徳首元演六十四母坤父乾春秋事教惟義與權行夏之時獨許顔淵樂教導和鐘鼓管絃雷出地豫樂之大原禮教導中三百三千其端辭遜如始達泉垂兹六教何千萬年睠惟此邦儒哲比肩厥有考亭是紹澗瀍發揮六學有功聖賢守吏初獻與士周旋祀畢作頌同志勉旃乙夘仲春丁奠畢作素王頌一首呈承祭之士頌曰於穆素王天縱將聖小用于魯振挈綱領莱兵面卻齊人退聴三都􅈥姦兩觀鋤佞市無飾賈朝無亂政少壮悉遜道塗不競曲阜大治諸侯交儆女樂間之可以出迸俟膰不至于衛之境留不煖席去復俄頃幾圍于匡幸釋以寗歸主蘧瑗耻居次乗彷徨過宋流離在鄭魋惡習禮木不留影立郭東門纍然誰省在陳徘徊弗授寸柄河水洋洋不渡者命蒲盟止兵蔡懼設穽楚尼書社彼哉䜛勝轍環靡歸不容何病十有四年魯復来聘亦莫果用六經是訂易繫禮編詩刪書定私淑三千弦歌雩詠維持太極與天地並賢於堯舜功用之盛専饗南面此感彼應籩豆牲牢庭燎輝映萬有千載垂于祀令承祭儒紳孰敢不敬何以事之存心養性四言詩贈張彊赴曲江教聖人立教以中為常不得中行取獧取狂未見狂者吾里有張議論傑然名壓上庠惡彼佞臣請劍尚方使終天彛蠶績蟹筐天鍳其忠䇿名顔行筮仕分教九齡之郷惟九齡公非血氣剛憂深慮逺性端行良禄山尚㣲測其陸梁國忠林甫惡未披猖公預窺之知其亂唐仁必有勇令名無疆彼元忠軰初志􅈭昂一遇擯抑盡斂鋒鋩媕娿喑啞不敢否臧自謂得計爵禄之場䘮已丘山得不毫芒士辨薫蕕與道存亡何以臻兹惟學問將弱翁懋哉以保令芳贈衡陽簿林士愷吾黨仲容行脩能通而志卓然以慕直躬嘗儕扣閽力摧姦鋒上旌其言擢第南宫府庠諸生坐斥怱怱君盡逺詒盍援掖逢予䟽已先所見略同每起敬愛有烈士風予歸里閈時訪藋蓬匪義不談惟理是窮告予戍及棲枳湘中壯哉兹行近紫蓋峰刑使傑然蜀彦之雄埋輪大勇折檻精忠朝夕趨承必得所從一被容接終身登龍惟仕首輔必亷必公惟學䇿要必敬必㳟胡張之郷名理之宗公餘取友以相磨礲贈林耕叟赴湖帥幕東萊之師是為拙齋學無不究道無不該體統純正䂓模拓恢卓成一家猶斗之魁未及百年遺響冷灰我守寳婺四學是開理學程正公史學司馬文正公文學歐陽文忠公經濟學范文正公以導生徒俾紹東莱回首七霜諒多成材英英耕叟我友自孩吐詞不羣制行亦瑰勉以朱學持論不回僕家源流是擁是培仲尼得伋垂教方来拙齋有孫其道未頽且告𤓰熟定王之臺僮馬載馳羔鴈屢催予聞湘流夙稱聖涯懋陵之邦元公所胎南軒昭昭五峯巍巍豈無秀民可與摩揩求仁得仁懋哉懋哉贈成師掾公䇿易中之䇿隂陽錯綜是興神物以前民用受命如響吉㓙生動子取䇿名僕沿理控先覺仲尼方人子貢惟誠前知不億而中中庸即易是道公共非䇿之䇿斯語請誦贈陳如晦堂堂六湖清秋玉壺我則尚友豈敢為徒仁義𢎞毅不可奪志豈私我朋義之與比徳必有鄰二彭其人與語終日澹無一塵以罪來歸得此四賔甘心澗谷以老我身贈詹生謁徐徑坂賢哉二生不逺千里瞻彼徑坂今之泗水予詩為容有進無止非殷洪喬乃互郷子次徐徑坂四言韻欹枕肱曲匱藏美玉造道髙深庭草交緑中庸致曲學記琢玉子過仙柯瞻彼淇緑美李頥老易易之廣大無方無體河圖授羲斯文天啟爰畫以象是陳八物演六十四闔闢伸屈文繫繇辭二千爻㫖孔絶韋編十翼偹矣後来濓洛發明幾盡萬世學者扵此取信𢎞毅李君以身體易消長騐氣吉凶考徳方初學時四載忘寐感蒼筤竹至産于地盖三十年然後成書其語不費其趣有餘予得其藳日置書案熟視厥履為之三嘆道無隠顯形上繇下脩辭立誠窮神知化示林宗辰勸學數語青出於藍氷寒於水立言勸學荀卿氏子卿不如軻醇乎醇矣謂學無他求其放心存則聖賢舍則犢禽差只毫髪隔踰丈尋必有事焉所言何事而勿正心正亦何累勿忘勿助持敬之意於此習察是之謂學於此而勸其進罔覺勉哉宗辰說博守約示趙與㯽𢎞毅章天之蒼蒼而在山中大畜之象驗之干躬六尺之㣲萬善畢叢徃行前言浩浩無窮一以貫之何所不容兩間非大此之謂𢎞牝馬之貞行地无疆古徃今来其道有常是以資生至哉化光君子體之六二直方直内方外何用不臧守此之毅賁育非剛泗亭之參以此任道繇軻而後孰其深造濓洛儒先知徳之奥非苟知之亦免允蹈興夫請書朝夕戴抱懋哉懋㢤至於華皓餞趙文思崇鐖歸上饒英英吾宗神駿之姿筆有天巧自鑄偉詞抱負不凡植立甚竒爰初筮仕即不詭隨笑世滔滔相與磷緇過予告别凛然自期耻逐京塵願易叢祠莱衣奉親樂道忘飢予惟上饒淵源未衰玉山文獻考亭所推章澗二泉名論清規邇来後生古為似之徐直諒之弟直方也仁親友兄徑坂是師子歸取友伯塤仲箎咫尺柯山考徳訂疑他日成就麟祥鳳儀寄徐端友立大夀其母夫人英英二徐名徳之雛早從爛柯知所歩趨南陔子職夙夜盡劬九日黄花采采盈裾請夀堂萱大年方壺龎眉髪鶴重錦軒魚母詔子前問學勉諸參匪直養心傳泗洙誠身悅親授伋著書子曰懋哉益厲厥初榮多遺母文繡不如戲舞樽前母為笑娛我寄四言俾陳座隅五言古詩酬盧威仲九日遣青衣送酒前年重九日黄衣携御槧抗牘回天聦批鱗䝉帝念雖慚獻六箴猶許䟽十漸去年重九日石鼔償願欠菊叢對佳客茰觴傾舊釅一時嘯詠狂萬丈詞華艶今年重九日龜息静中驗亭前寒葉落樓外晴波斂故人何殷勤清樽持瀲灔思君甲辰䟽擬昔尚方劒士鋒皆辟易忠舌為飫饜回首今七秋日月光同掞知暫陸渾㳺難久承明厭老我思荷鋤一壑柴桑占暇日領客登眺暇日登層城目眺黄花岡来山何岌嶪餘勢猶廻翔郡治枕其中溪流繞其旁建中實經始淳祐罹懐襄河伯何不仁平陸如江洋水餘予領牧初至覺荒凉賴天賜連稔田里多稻粱舊觀喜漸復新屋興未央偶領賔戚㳺松下傾盃觴嵐氣接洲渚舉目皆寒蒼為饒計使題煌煌使者軒新扁煥羣目周爰逺有華不可居無竹天風泠然来雲氣滃而簇知君子猷趣一笑等榮辱每云安樂窩似勝相州纛憑欄對此君竟日翫不足余亦慕姱莭時時賦猗緑閒思載醪去悠悠想九曲新詩帶仙姿霞飡謝粱肉願言植梅友疎影横水澳徐朝奉誥命下走介賫納徑坂賦成驛足行都来手賫誥一軸發視喜非常耆儒見褒録斯人徳無瑕有子道振玉陛下自好老㣲臣耻干禄耕雲入山深釣月翫水緑一朝朱紱賜龎眉釋袍鵠莱衣拜稱慶起舞徧親族我在霞洲上折屐亦越宿兹忻賛書至哦詩遣騶僕遙知參侍㸃論學紹淇澳和徐徑坂我敬楳埜翁治郡如元結一朝殉國死黄壤恨誰雪赤輸陳蕃心碧化萇𢎞血銘筆得柯仙羣隂消蟋蟀予歸假闔廬守曰於我館風雨已遁逃雲山况竒觀徑坂形聲詩蓬萊名遂逺求仁居之安是宅靡有間食梅兒時摘青梅葉底尋彈丸所恨襟䄂窄不憚頬舌穿我年不自覺以我齒尚完嘗新試一薦喉棘眉先攅豈味不悅口豈老難强餐人生煎百憂筭梅未為酸夀史刑使岷峨儲英賢一例皆家食公亦淹海角麾節猶赫奕七閩政多幸福星照南極輕裘鎮鈴閤使斧光衛㦸門弧初度臨和氣徧阡陌宿雨洗瘴氛􅃋雲報寒色前期為重九後期為至日中間産蜀珍天意扶陽脉願言愛剛健他日夀王國七言古詩謝胡繡使招飲疇昔與公同奉常余為藉田公社令是時􅃋祭拜卿少余已顔衰公秀瑩齋房並公揮麈尾議論風生真纚纚蜀珍數人皆在坐盡說功名湏遜子回頭一夢十五春公為使者余㕓民薫風荷畔緑樽設丹荔粲粲蓮房新語間切切憂民瘼隂功亟欲蘇全閩出經入傳知言要湘西絶學今誰紹我老西河欠鞭䇿此事湏公正英妙送眉山孫夢得從饒伯輿李純父學景山書来說蜀珍與吾氣象清而真束書亟歸侍温凊力祈樸學為是正程文不過工進取何若杜門誦論語一言可以行終身世間至樂惟求仁弋陽餘干相望爾紫陽的傳伯輿是同志更有李純父勁莭清名照今古為我問訊出此詩子親炙之有餘師示林桂髙歌丈夫流芳在身後眼前一食常不飽何况吟工抉元化萬象日月遭捜攪君不見飯顆山頭餓少陵柴桑徑裏饑淵明無錢對菊坐終日得錢沽酒醉交朋又不見春岸飛楊花聖俞得句貧轉加羊腸遶車聲黄九一生坐窮鳴歐蘓只得從旁嘆不爾何由負盛名景南將赴武昌道出剡溪􅃧成贈行丈夫未遇時流俗多白眼張耳能致千里客相如竟輟萬金産方子一世英要路争力挽行行取侯封何必守蠧簡陳謂老見過云今年六十有九將預為周身之防余曰君定未死不如覔錢沽酒耳用􅃧成拙句贈行荷鍤自隨劉伯倫裸葬舊聞楊王孫偉哉二子真曠逹身雖殞㓕名獨存要知形骸本外物中有妙用超六根火風地水歸四大夢幻泡影何足論君不見桓魋石槨秦鐡户歌鐘未徹野火焚不如得錢即沽酒時時醉倒三家村和徐徑坂韻二首玉柯仙管頻念我大書束縑濃墨斑寄情縹𣺌江海際匠語􅃤澹雲烟間燃藜太乙中夜照垂釣客星清晝閒觀公舒巻皆以道仁智山静水潺湲學者山斗吾徑坂杜門養志衣莱斑孤峯度越青雲上一世失得浮埃間鳳鳴思誠頻遺訊龍卧草廬相對閒三賢鼎立名師友衢江萬古身潺湲贈武應辰見徐徑坂衡陽布衣武應辰柯山迎拜新使君使君道徳今天人不知肯開衡山雲君看衡雲開未開吾道所關非小哉應辰為我三致意行藏已定顔心齋示趙與㯽今年至日有喜色四方士友来請益徳場宗英質大學上饒諸賢問太極草廬一紙隃寄音徑坂七言大書帛衰予甘遁西河上㸃檢身心有方册夀史刑使羡公博學今揚雄未許蜀珍専瑞蜀喜公奉使今鮮于又見福星来照福我初敬公因讜䟽萬言批鱗折五鹿我轉敬公縁清操髙吟放鶴孤山麓今兹仗斧更仁厚庭草不鋤生意足憂時兩鬢白髪增愛賢一念緇衣篤衰予歸卧西河上都騎時来尋澗谷清言竟日無盡藏想見胷中幾天禄若人盍置論思地垂弧定有鋒車趣去年五言稱公夀今年笑指湖山緑贈璘上人潜齋山雨過從久每說二公不離口山雨去佐玉樓仙潜齋起領金壇守一江一浙兩知音栢枝東指還西否胡然拄杖轉落南膜拜叢中獅子吼騷體與張草廬予欲嗣奏聘君草廬寄聲止予歌以答之姑蔑之􅇕郡郭之隅幽閴兮陋巷卑渫兮䋲樞真人兮匵藏道貌兮山臞有時兮過市徐行兮當車天津游兮聞䳌而慨嘆鹿門登兮采藥而躊躇明月兮嘯咏白雲兮巻舒我評其人陶邵之徒疇昔歲兮司銀臺力抗䟽兮徴玉廬朝奏墨兮欲下暮出晝兮尼諸君一笑兮草芥余三惜兮璠璵擬箋天􅀆嗣請近因風兮止余仰髙致兮慕予積卑忱兮願攄善不進兮不已終當諒乎純愚答徐直方問無極歌謂無極不可狀兮造化之樞謂無極可狀兮聲臭俱無至哉濓翁兮是剏是圖後来諸老兮交辨鵝湖彼是此非兮畦畛何殊究其指歸兮風乎舞雩吾黙㑹於心兮徴以通書隂陽動静兮何始何初人人有是兮奚問乎吕陸張朱遺徐端友夀母夫人歌望東雲兮懐玉産二英兮鸑鷟持榮名兮夀親頌大椿兮對菊飱初英兮慕屈子之菲菲飲寒潭兮陋胡廣之碌碌我敬愛之勉以猗緑垂芳兮無窮介母兮多福五言律詩趣饒伯輿来期忽得髙賢訊篝燈讀數囬苦辭白鹿講盍為紫陽来水毁祠無恙堂新教有開湏君速戾止倡道淑英材寄李頥老清苦推洪毅人今合古求道東吾所敬學北子為優夜氣存無餒晨餐缺不憂時来同析理相對一茶甌送伯和姪歸里之戍留爾紉秋桂歸歟迫戍𤓰定將儒術飾肯以惠文誇獄敬禆王國帷褰佐使家公餘更努力學似海無涯送㳺幾叟衡山尉西風催仕軔比部得英曹澤物官無小觀山嶽最髙湏知戴星出慎勿厭塵勞綵棒有餘暇何妨誦楚騷餞用晦姪南安令爾宦神臯日搢紳無間言勇懐南邑綬為便北堂萱侍講鸞棲舊端明棠䕃存時能挹前軰為政有根源作邑無他法精神在拊摩吏肥民必瘦酒少飯宜多寜拙催科考湏知于蒍歌莫將還債看好事易蹉跎挽竹湖李端明千古筠溪節名孫尚有諸敢言禁闥黯勇退漢廷䟽掃軌門如水懸魚飯只蔬訃傳纓紱駭惜綰不中書淡似香山老臞於涑水翁政湏將及子心孰不為公後進師清儉前旒譽直空墓陵手所築過者式髙風挽盛君時忽報斯人訃傷哉命壓頭皇皇如有索落落竟何求學道魚千里辭家貉一丘幸哉猶有子可解二親憂
