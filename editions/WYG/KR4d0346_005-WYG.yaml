body:
  text: 庸齋集巻五宋趙汝騰撰記永福縣修學記永福邑大夫林君士宗修學告成邑士陳彥信與其徒十餘人謁予請記寓居太博盧君鉞助其請者屢遂進陳生而告之曰子知邑大夫修學之意乎曰將以教也子知太博督記之意乎曰將揭所以教也則遂唯其請而以臆見者與之語盖孔子曰富與貴是人之所欲也不以其道得之不處也貧與賤是人之所惡也不以其道得之不去也均為不以其道得然富貴則避貧賤則就何耶是義利之分取舍之判也夫是之謂仁仁非寓於貧賤也厭貧賤則未有不失其本心而趨富貴非所以為君子也故繼之曰君子去仁惡乎成名伯夷之志操即此章之推也故孔子予之曰求仁而得仁又何怨又曰伯夷叔齊餓死于首陽之下民到于今稱之孔子殁曽子得其傳亦曰臨大節而不可奪君子人與君子人也又曰彼以其富我以吾仁彼以其爵我以吾義吾何慊乎哉曽子氣象東都陳蕃范滂諸人實近之而未至者也蕃之言曰合亦食禄不合亦食禄臣雖無素潔之行竊慕君子不以其道得之不居也滂之言曰仲尼之言見善如不及見惡如探湯欲使善善同其清惡惡同其汙蕃滂清裁亷尚潛扶漢鼎異時殞身殉國庶㡬於臨大節不可奪者摭其言論風旨自論語中來也西都之儒拒人言而衛王氏先身計而後宗社張論非不盛行適足資識者之一笑甚至劇秦美新佐新珍劉其於經術可知也史謂西都儒學東都名節岐而二之盖未之深考也已吾聞邑之前脩有黄公龜年劾秦檜罷相去檜再相黄寓霅溪斥歸鄉貫其人凛凛有蕃之風吳公元美多憤世嫉邪之作仇家織以媚檜至謫南州以死亦庶㡬於滂之惡惡矣二公所立卓然晩進至有未識其姓名者是非任風化者之責歟邑大夫既新學宫又舉學政其亦思以前脩氣節以淬士習歟夫士而以蕃滂自期其於道猶未也士而不以蕃滂自期其於道已矣雖然欲勵以黄吳氣節當先導以程朱問學程朱之學問顔曽之源委也學問正則諤諤蹇蹇者不磨學問不正則節守隨血氣而盛衰矣可不畏哉陳生與其徒皆以予言為然故書以授之俾歸告于邑大夫且以勉同志之士論論漢唐誅賞高祖天資本明而將之以寛大太宗識見固高而將之以詳審惟其寛大故事為常暗與道合而間失之疎惟其詳審故事為每闗於念慮而或過于密然觀二君於封爵功成一事則皆有可得而言者高祖之分封自子房而下以及于灌嬰樊噲之徒無不各厭其欲至于雍齒以疇昔睚眦亦且矯情而賞之帝可謂無負諸臣佐命之功矣然方楚漢爭雄之時能使沛公激發天下之大機括者誰歟三老董公説之以三軍素服共誅楚之弑義帝者順德逆德之辭昭然與日月爭光人心稍知義者其從順去逆已如此决擇矣董公之説又豈蕭何文墨之比以子房號為帝師籌幄之間亦未見有此大計當時仗義而西天下為之響應者董公力也論功之際帝乃念不到此借使是時公已遠遯如介之推言不及禄則綿上之田亦胡為而恝然也是非高祖用明以寛而疎畧于事情耶太宗之報功房杜以善于謀斷英衛以長于攻討勲庸稱為諸臣冠固宜爾也至于劉文静語多怨望反狀已形時帝在秦府直謂太原首事文静實啓其謀令處納言似謂乃翁報功之弗稱使文静於此不自取禍敗則帝之即位也必首念此身之富貴一皆文静之所効賞典之行未必不加之房杜之上太宗亦惟知文静有密啓之功而不知文静以穿窬之輩乗亂挾姦教人以窺伺鼎璽之謀在帝首當勸其父正以無君之罪當如高祖靣數丁公之不忠馘竿以狥衆可也太宗方且欲重賞以報之帝雖周于事情果為有得於詳審乎即是而論董公為萬世之忠文静乃萬世之賊高祖之待董公宜如太宗之念文静太宗之念文静宜如高祖之待丁公然高祖能嚴于誅而畧于賞君子以為似虧寛大之素而不害其為公太宗欲推賞而不加誅君子以為詳審之中純乎私序内制序國朝故事無宗姓入翰苑者惟大本以宏詞南塘以甲科予離場屋遲素不習制誥之文誤為諸老見奬遂踵南塘給札李公太史心傳開史館辟予同劉公漢弼徐公元杰為屬予周旋中秘兩朞史館一朞忽除常丞兼表郎李公謂予曰故事為表郎則當兼詞翰之秩予方遜謝忽史院吏以除目示予兼翰林權直乃力援非宏詞甲科不當入辭不獲遂就秩其後史丞相嵩之解督府歸相位轉官適予當草制直筆無假借有箴砭嵩之大不悦力辭三官不拜制予自是亦乞外者屢而不獲又其後以廷試多士宣予已至東華門有旨改高翰長京師喧傳史丞相故為是也或謂恐發䇿太直予以是乞去得請守永嘉自已亥秋至辛丑夏凢歴三朞中間獨當草制一朞有半得制詔等文四百餘首然予每謂北門之職非但尚詞藻記問而己人主心術係焉故予於正邪是非之間每因詞令而為上别白言之率以是取忤于人然不得罪于天下公論者則亦以是也因猶子崇烟刋于家塾遂序而授之外制序淳祐甲辰上逐嵩之相范鍾及杜公範改紀庶政明年乙巳程公公許徐公元杰相對為中書號為得人繼而徐公殁朝野嗟痛以起居舍人召余于婺州兼中書造闕㑹程公于絲綸閣下程公俾余書上房余遜不肯受只書下房故自乙巳至己酉凢五年皆只書下房惟丁未春應繇同知貢舉堂劄上房兼俾予書是時李公韶以病力丐去又劄余兼翰苑撰述一時内外制上下房文字皆予視草亦儒生榮遇也然予獨喜以書下房遂得行周元公程純公正公兄弟張横渠四先生封伯告詞非幸歟又下房大率行謫詞予未嘗敢没人之善雖不匿瑕亦不揜瑜間有謫非其罪而行詞亦皆不没其實如莫子文不肯任括田劾去常挺以齋宫卒閧降秩是也又有詞頭雖𨽻上房而公論藉藉不得不采為上言者如䟽鄭宷别之傑是也又有吏議貶其人非當留黄不書而施行遂為之格如止王三俊之貶之類是也又有直聲為當世所稱者吏議逐之公議洶洶既留黄又為之奏于上申于都省如救李公伯玉諸賢是也大抵皆視公議如何耳予何心哉通計上下房制詞凢若干首福建刑使胡公予舊奉常同寅友也請外制藁刋于臺治遂序其本末而遺之蔡覺軒模論語集䟽序聖賢不作而千萬世得以求其心者頼有書耳是以更闡互繹不害其為愈精而愈密魯論師友答問書也善待問者是書具矣更秦火不亡漢魏諸儒訓詁備至厥後邢昺䟽之然皆僅得於名物度數之間迨我朝舂陵夫子獨得道之大原以倡二程二程張横渠三夫子繼和之尹謝游侯吕諸人又和之是書各皆有訓詁義理粲如也至紫陽朱文公集註出而始集大成矣前有集義後有或問文公意未巳也至集註則暮年更定之書盖其宗主程張及三先生之門人竒詞奥旨靡不畢備間有網羅漢魏旁及蘇文忠昆仲范太史及南渡以來先儒一字一義之精亦皆在所不遺嗟夫何其粹也學者玩索而實踐之可也文公殁二十餘年其門人高弟皆不敢有所發明厥後勉齋文肅黄公授學者於華峯之上始著為通釋近建安覺軒蔡君模又著為集䟽二書出愈精愈密矣勉齋親炙文公之乆教學相長集注因之而更定多矣通釋大抵發明文公更定之意也覺軒則其先大父西山與諸父九峯節齋皆嘗從文公遊而身又及事焉淵源厚而濡染深生雖晩而聞最多故集䟽雖間以已意然皆采文公語録與文集及延平問答勉齋節齋之説近時真西山諸人其説茍有合於文公者亦間取其一二通釋則峻潔而篤實集䟽則沉潜而縝密大抵作而未離於述也皆所以羽翼文公集註之書也予聞覺軒學行嘗數數為上言之覺軒殁其子湛然文學彬彬訪予於建陽道旁及抱其遺書直至三山而請序於予魯論集䟽其一也且曰先人將瞑目猶拳拳於逝者如斯乎之一章予曰是非斃而後已者乎故樂為之序蔡模易集義序易之為言在太極先羲文作周公孔子述凢更四聖人矣其為書也廣大悉備豈直象辭變占而已哉左氏載易占法特其一耳盖易可施於卜而非專主於卜也善言易者莫邃於濓溪善傳易者莫精於伊川通書曰萬物資始誠之源也乾道變化各正性命誠斯立焉元亨誠之通利貞誠之復又曰思者聖功之本吉凶之機也君子見幾而作不俟終日知㡬其神乎又曰不善之動妄也妄復則無妄矣無妄則誠焉故無妄次復而曰先王以茂對時育萬物濓溪之旨伊川得之即陰陽屈伸往來闔闢之妙衍而推之於人事舉錯酬酢之間擬議變化之際曰隨時變易以從道也四聖人之藴具於是矣當是時書出而門人有泄天機之語伊川自謂止七分盖謙辭也朱文公因公用享於天子田獲三品等辭遂有本義之作曰某彖占當如是某爻占當如是近世學者遂一切以卜筮視易而不知文公預憂之矣其原象曰程演周經言盡理得彌億萬年永著常式其警學篇曰在昔程氏繼周紹孔粤指宏綱星陳極拱其推程氏之易極矣其訓學者至矣豈專以卜筮言哉文公之高弟蔡西山尤通於易嘗授其子節齋節齋授其猶子覺軒今覺軒集義所載是也集義宗主程朱楊吕參之家學間又附以已見於困卦言小人之困君子適足以自困釋艮卦彖辭之止為閑邪釋爻辭之止為聖人之止是皆儒先之所未發大抵發明義理不專主占筮也魯國男子以吾之不可學柳下惠之可若覺軒者可謂善學文公者覺軒之子湛然曰是書先君猶未脱藁予曰義理其有窮乎天假覺軒數年其書又不止於此矣湛然將刋而傳之俾予附名篇端不得而辭也説盛時立中字説揖讓征誅異尚同符時義大哉闔闢巻舒瞻前忽後顔莫孔驟匪嗟一中聖時未就隣鬬異室纓冠赴焉未之思也執中無權軻也誰師參傳子思君子之中君子之時陳讜無黨字説憧憧往來朋從爾思未為無心偏係之私豈若同人出門而同同又何咎至正大公陳子讜名字曰無黨何適何莫心平道廣曽坐徑坂春風三月徧走諸賢餐風茹雪不避希文不薄臨賀母亦黨乎知仁觀過眉山孫夢得子良仁字説仁字罕言匪言之訒天何言哉子則非隱如愚之回言下體認從事四勿風飛雷迅三月不違人欲淨盡曽氏之子以魯篤信任重道遠切問思近自省而入因唯而進吾濟何師囘參為凖在易之復聖發其藴不遠元吉頻則為吝伊川四箴萬古心印求仁得仁春融玉潤周一龍正學字説周君士壯有文學氣節易名一龍星沙郡傳士黄君國字之曰正學盖取乾九二龍悳正中學聚問辨之義周君復請説於予予誦横渠張子之言以告之張子曰龍喻聖也學至顔子方可言龍雖伯夷之學未可言龍盖夷有聖人之節囘有聖人之學節立則百世而下聞者足以興起學成則萬世之標凖孟子曰伯夷伊尹皆古之聖人也乃所願則學孔子囘之優于夷者以此視孔子特未達一間耳囘之擇乎中庸得一善拳拳服膺而弗失即九二之庸言之信庸行之謹也囘之從事克已復禮即九二之閑邪存誠也囘之無伐善即九二之善世而不伐也充此而上至於化則孔子矣孔子猶龍也顔氏之子其庶㡬乎喟然之嘆其在斯時乎周君知勉所以立節矣予請誦九二之所以與顔同者演而明之夫士不志於學則已志學而不以顔為的非善射者也周君勉之歐陽伯時字説春而萌芽夏而長養揫斂於秋而閉藏於冬天之時如此可以仕則仕可以止則止可以乆則乆可以速則速聖人之時如此知時之義者其發而中節之謂乎渉於過不及則必為小人而無忌憚故君子曰時中歐陽氏子年十有一育於外大父袁仲禮其生也有以時魚饋者袁君名之曰時時楚産也出必春莫漁伺之識歲月以其時也故以時名夫時非有知也乗氣而化時且如此今吾之時天所命也人欲既勝顛倒錯亂曽時之不若故字時曰伯時而書其所以告之立軒説示卓然中天地生惟禮是執伯魚過庭子告以立子張參前敬則能集卓哉聖人年在三十厥功已深域則優入顔其喟然鑽仰莫及吾徒懋哉學而時習徐直諒端友字說人倫有五一廼友朋無間尊卑相須以成惟是取友有辱有榮與勝已居智識日増友不如已驕吝日生德鄰不孤義同為朋咨爾輔仁勉我立誠尚友方册以是凖程彼薫彼蕕我渭我涇已正友正如響附聲求仁得仁否亦令名端友懋哉慰夫九京徐直方立大字說直方而大坤六二章坤之為德應天無疆惟方惟直惟大有常坤之六爻六二最昌臣道子道履之有光軻書亦云直大而剛浩然充塞爻義尤彰敬内以直義外以方大而包含進善莫量泗庭諸子參不可當毅而能𢎞何用不臧立大懋哉仁伯不忘祝煒明仲字說吾聞降衷湛然虛靈貫理與事統性及情上智養之天粹天精下愚汩之日困不醒是以君子問學營營學為啓瞶春空震霆學為剖䝉靈曜運行昭明為晉明本自生輝光為蓄光以養成濁明外景如火燭㝠清明内景如水鑒形澄之又澄大學明明明仲懋哉知至意誠跋經筵講義跋主一周君錫既刋予鼇峯講義于家又索予頃在經筵日講説命至旅獒十三篇并刋主一為考亭勉齋之學者也故于義理之文拳拳然如此而予不足以稱然其請之力而不得以辭遂發篋以授之徐徑坂銘楳埜徐侍郎墓跋徑坂銘文周情孔思如麗日信星垂之萬世粲如也書體崛竒勁拔追仙聖而侔造化可以慰楳埜九原之魂矣陳帥參南一奏䟽跋吕成公舘職䇿議論精當文采英贍學者所膾炙而朱文公獨謂不然以其不及時事也蓋成公主優游和平文公主慷慨激烈參議陳著郎奏䟽醇厚正大不為劘拂嬰觸之論大扺自本原上發豈其見有合於成公耶抑有所待而後如文公之論耶著郎耆年宿徳而問學方如川至未可涯其語嘿皆不茍他日重登文右班所論建必大有闗於世道者此編特其權輿耳贈蔡澹然跋文公之道不絶如綫海内有三布衣猶得其傳予每言之上建之覺軒仲覺其一也未㡬覺軒殁矣其子澹然以父書來請序予為之序易與論語矣澹然歸求予贈言予謂太末之里徑坂之巅有偉人焉子合擔簦褁飰而師之他日必能紹絶學而成令名子其勉之跋鄧元觀詩鄧元觀有詩才平澹簡遠予愛其題釣臺一聯云寒來暑往人千載月白風清水一灣蕭然於名利之外亦足以見其所慕尚矣然予嘗疑古人詩言志而未嘗志於詩後人志於詩而詩不足以言志然則尚求工於詩耶元觀生了翁之鄉為栟櫚之後其所以自勉者又當求於詩之外可也跋林桂高詩林君性老才器英拔識見深逺雖在韋布代公卿大夫任世道之憂别白當世人物某忠某佞某為善某為利皆言於未然已而果然予心甚異之厥後從徑坂游入匡廬居問學超詣詞藻驟進以一編詩遺予於湖山間讀之盡巻掃除腥腐吞咀菁華凌厲高遠駸駸當與后山相上下性老又謂予曰自得從徑坂後非人之門不登非禮之饋不拜是其甘處枯槁傲視富貴則他日之進未可量何獨詩哉跋倪龍輔詩近世詩人趙蹈中最為雄傑每對予誦杜荀鶴早被嬋娟悞欲粧臨鏡慵承恩不在貌教妾若為容風煖鳥聲碎日高花影重年年越溪女相憶採芙蓉之句擊節不能已又常欲彷彿其萬一他日予舉問南塘獨謂不然疵其出語太沾懘予熟咀此詩八句皆無毫髪憾而南塘之論乃爾是豈可與俗人言哉近得梅村倪君遺予詩一編深鉅高逈不肯為近世里巷歌謡語蓋知惡夫沾懘者也惜也不及見南塘親炙其流波玉合之講貫益精含咀益深見諸賦咏必能運翡翠鯨魚於一致何荀鶴之足云哉跋楊君恢詩楊君詩詞甚似其外大父植齋余為之擊節若司馬子長之外孫曰楊煇文采風流與子長無辨今於楊君見之李監簿誌銘跋嘉定乙亥旱時應詔抗䟽者數人陳公宓倪公千里與國子簿李公䟽切直在諸公吟口而陳為最公陳六事忤中殿特甚矛猶記少年時挽公詩有身登玉筍䟽忤椒房之句今三十七年矣公之于大蓬以真西山誌銘示予俾跋予愛其銘文黙于廷譁于朋夫誰不能平居呐然有䟽萬言維公之賢數言併揭而書之孫安人誌銘跋參議陳著郎問學源於味道殿講文章源於水心侍郎周旋二葉之間故其學有本文有法其誌内子孫氏特其文之一也然叙事簡質而不拙幽邃而不迂崛竒而不儉則自水心來也孫氏配君子於貧約之中無愠容撫諸子於後先之間無二心非賢而能是乎著郎銘之無愧色矣跋寳月老頌解多心經寳月住持于心學拳拳如此而為儒者之學乃于放心不知求汲汲然於章句詞華之間亦可哀也哉
