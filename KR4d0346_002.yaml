body:
  text: 庸齋集卷二宋趙汝騰撰七言律詩登北苑焙呈髙計使謝庾使急雨收聲霽景開蓬仙嶺客島雲來千叢擷秀牙鋪雪萬臼研膏杵震雷池上落英留緑葉眼中飛絮點蒼苔去年醉墨今重看笑領詩翁瀲灔杯蜀浙當年貢亦勞至今惟重建溪毛地靈丹鳳銜萱草水聖蒼虯幻雪濤笑指茶星誇小范愁傷民力歎袁髙顧渚茶詩髙筆也皇華早晚歸經幄丁俑應難諌舌逃陪饒計使至北苑焙東風未緑無邉草北苑先抽絶品芽六轡行山清霧􅕙一槍入焙帶煙霞鳳呈竒羽名仙麓龍護香泉供帝家萬碾玉塵飛動處鬼猶勞矣况人耶和饒計使北苑焙觀貢品使華金掌冠卿材曽侍紅雲一朵來龍井為君增洗濯鳳山來客小低徊膏翻玉雪團香帖味篤金蘭共酒杯計相他時踵龎老席前敷奏記東臺再用韻天生神醴地生材曽感當年鸑鷟來釣水取清芳酷烈採山可茹味徘徊能招霞侣雲中笑得奉龍顔食後杯細品第三綱最勝人間雙井當輿臺再用韻答饒計使周原膴膴𨽻臺綱茶篚馳供玉食香貢重鄭男難並列品珍考叔未曽嘗乳花烹就分清貺英草吟成屬大方後蔡前丁同入諷令人懷古九廽腸東坡詩荔枝嘆武夷溪邉粟粒芽前丁後蔡相籠加三用韻答饒計使郡凋亦辦七茶綱不似霜臺雀舌香上美為元包錫貢殘膏分丐雪翻嘗三為大有天王饗二得坤中臣道方退食自公味公賜狂吟牽動璟心腸謝髙茶使遣餉頭綱貢餘東風吹折鳳山芽驛獻花箱仗使家遙想仙芳供御碗應憐味諌落天涯厥包錫貢何年始其苦如飴信地嘉齋祭無繇陪褥位膏餘分丐咀菁華再用韻答髙茶使凡卉千山未吐芽天生靈草瑞天家漕修貢事東西廨使起英流南北涯諌苦固應疏汲黯品髙終必相王嘉老衰不辦茶歌獻但誦周原逺有華謝饒計使遣餉頭貢餘仙芽龍水辦頭綱百草山中不敢香表進得陪華使拜貢餘遣餉守臣嘗擬思苦口陳忠諫可但飴茶獻上方分我清風生兩腋惜無文字只枯腸慶髙耻堂柱史都運招麾不可獨斯人中外稱為社稷臣永叔未容居四諫鮮于且起福全閩光華濡轡今親遣風采埋輪又一新命下八州俱鼓舞紫霞老守喜津津答髙耻堂計使招賞海棠皇華相約醉崇臺正月海棠彌望開萬象呈春杯瀲灔千花炫夜燭縈廽雨餘妃帶華清沐雲幕仙從綘闕來明歲公歸對紅藥吟成寄我館蓬萊再答西州名品萃東臺特為光風連夜開春事三分元未半詩腸一日九周廽雨中有淚坡吟盡馬上霑花甫醉來郡塢數株寥落甚園丁愛護剪荒萊再答人間姚魏總輿臺獨占神仙上品開絶代詞華三峽倒當時諫草九天廽晚晴大白簷前舉春暖小車花下來筆補浣花溪畔老吟工壓倒北山萊再答孤風獨上子陵臺藻思天然頃刻開銀燭不妨花下照鐵心肯向賦中廽休懷濯錦江邉夢早應築沙堤上來急裹紫霞望公至也教凡卉識仙萊答髙計使韻使承帝命若豫工膴膴周原布惠風正似公權懷筆諌豈如後蔡譜茶功春盈夏涸疑神水荼苦飴甘屬太空芹獻固知仍舊比采蘩泂酌亦昭忠再用韻賀計使髙耻堂建臺得雨皇華都騎訪陳人似灑仙瓢助守臣亭午建臺申大雨作霖用汝澤先閩物情是處皆欣吐吏習從今一洗新陜事早知付韓范堯夫定不歎天津和髙計使郊行春光物色伴揚班晝出城南暮入閽轉蕙風吹禊亭竹採桑日照女筐蘩清遊得共皇華醉妙語能追紅藥翻一任鵑鳴芳自若坐間嘉客意同原再用韻答謝石嶼庾使一翁間伴兩星臺亭畔看花花半開我盍歸田垂釣隱公行持槖侍鸞廽流鶯似避宫粧靚黃鵠曽將蜀種來二妙賡酬康濟手橫舟句好相推萊慶髙耻堂柱史除漕九曲山川值異人仙靈欣舞對波臣德星臨照來從蜀瘴霧澄清一洗閩澤物濓翁仁望著寬民王旦政條新爛柯精舍班荆語好約秋風到北津徑坂許到武夷紀遊一首呈髙計使謝庾使天風吹我到丹青不覺春華又再經芝叟採來雲冉冉茶仙嘗後水泠泠溪山信美琅琊景宇宙無窮峴首亭登者固多公不朽老衰得附鳳凰翎復用韻答髙計使謝庾使何人潄石枕寒青飛鳥徘徊不敢經却騎同登觀溟涬懷仙遙想戒真泠西山南浦臨流閣北樹東雲把酒亭道極髙明須峻絶鐵獅峯頂振風翎陪髙計使柱史謝庾使刑郎登梅仙山丹青閣侵雲祠宇絶荒涼目眴憑虛興寄長仙者逺遊非穆穆天之視下亦蒼蒼貴公業趂塵泥腐小尉名爭日月光此地何緣子真到孤忠處處慕留芳又節迎吹帽約郊行衣夾登危露未零一笑向時分皂白相逢今日共丹青清姿照世郎官宿徑操擎天柱史星自有此山無此客來同老守醉還醒又和饒計使丹青閣韻久聞傑閣願今酬亭午登臨到上頭二水清澄新雨霽衆峯蒼峭凍雲留擬賡場圃詩人句休負煙波墨客愁信使偕行原隰耀仙山多謝約同逰又再用韻和後期採菊約新酬笑指西風帽戀頭陸羽久仙泉水在紫芝何代寺峰留霞邉野霧供吟嘯澤畔歸鴻免歎愁愧乏登髙能賦手陪公後乘寫清逰徑坂左司使君惠和近詩為親而喜合天理之公得性情之正復用韻以慶扶杖來觀遍老農清朝新禮采芝翁德尊韋布封員外恩重牙緋視治中言悟千秋逢主聖躬行萬石耀臣工求與抑與從天下徑坂丹忱殿陛通何曽學圃學為農陋巷蕭然白髮翁便拜馮唐長郎署更榮𢎞景相山中詔褒忠孝垂青史上想儀型遣畫工莊叟湛然元不動平生風雨視窮通奏徑坂尊公致政盛德於上就以詩報之拜疏歸田學老農天髙未肯聽衰翁逸民且舉邵康節有子併稱程大中給札説書皆御墨教忠錫爵勵羣工老臣只代臣頥請頥不祈恩何自通贊徑坂使君柯山仲春講席之盛贏糧多士二千餘爭向柯山講席隅立天地心鳴道鐸開生靈眼識師儒孔融魯國竒男子孟氏鄒人大丈夫我在紫霞洲上笑惜無羽翼到三衢驛至得徑坂講席帛詩喜甚和韻且堅秋風武夷之約驛足歸來以口陳爛柯山色碧嶙峋橫經二月二十一聽講三千三百人聖者子孫皆在列愚而夫婦也知津衰翁首看法筵義文與正蒙相比倫紫霞老子望青霞喜誦新吟倚鬢華已遣鳴騶迎道左那知紉佩尚天涯為莊椿夀稱觴近訪武夷仙卜日賖秋夜月明逰九曲棹歌聲裏賦巖花和徐徑坂帛詩韻併約徐立大同賦謁想仙姿詩見之壇髙屈宋𨽻吾麾在邦無怨仁何怨與世多違道不違一魯丈夫獨儒服百曹相國漫戎衣折衝人物山中隱誰佐君王立德威夢徐徑坂誰云姑蔑逺無諸夢繞柯仙抱膝廬我得間中翻魯語公應靜裏玩羲圖雷猶地伏陽新復雲向天升雨可需好倡諸賢為時出只容衰懶老西湖用前韻呈史繡使吁嗟膚使襟期厚來顧陳人老鬢班席地樽開樵舍畔停雲興在玉柯間不知天上皇華貴也共山中半日間好向金門領名勝獨留一叟弄潺湲和史繡使瑞梅韻憶昔朝旌别未央逋仙風味飽嚌嘗繡衣來酹東濤月清節更餐南雪香姑射真仙陪直指緑華再蕚瑞髙堂蓬萊花使傳春信早晚芝書趣覲王餞史計使祥刑生意遍庭荄蔽芾棠隂手自栽世降此翁猶尚德俗衰時輩但論材九仙截鐙于公去萬石熏爐召父來攬轡紫陽垂教地饒何盍聘到崇臺饒魯何基二士善為文公之學者也使者星明太史占東風戒路揭帷襜食當加倍稀親酒獻不求餘少𣙜鹽因進御茶供味諌肯然官燭示家亷老生莫效臨岐贈詩附仁言當束縑懷史計使皇華叱馭遂驅馳抱病匆匆語别離不到天風海濤地空吟春樹暮雲詩似聞信宿留桑下惜不扁舟趂水涯一笑論文何日再玉川為我説相思謝史計使寄建茗皇華珍意辦頭綱餘馥吾儕也得嘗黯戅終然言有味同衰那得字搜腸耕雲隴畔知無憾貯月瓢中剩有香獨念郊民多萊色旱飢粟價踴非常鎖院既久考文將畢適承按察使房公子靖遣詩相慰因和以答恭承禮聘典文宗秉筆秋闈合至公城郭縱逰知有日院門深鎖寂無風掄才未擬升司馬發䇿方將問卧龍忽辱有詩相慰藉一時裁答愧匆匆附吳淞人物老儒宗閩浙文章屬巨公竹葉幾杯惟對月棘闈數仞不通風較文已辨珉兼玉揭榜應知魚化龍近日有心來聽教奈何方面事匆匆别伯輿新鄱陽廣文特為豫來冬復春重尋舊話續新聞諸儒學北今誰嗣獨步斗南猶有君精舍諸生朝問道郡齋一叟夜論文縶維不可成分袂搔首江東日暮雲呈竹湖李端明淳祐清忠推杜李巋然名德賴公存嵗時闊會英耆社風月稀遊獨樂園一榻自觀心主靜諸賢欲扣我忘言僕歸借屋西湖畔半載才能兩造門再用韻答敬簡如翁吾所慕即之目擊道斯存斥歸借卧平泉石倦出幾名傲吏園早日寒齋令尚友近來徑坂寄傳言文山歲晚梅如雪擬約龎公到鹿門次韻叔興見贈眼界紛紛盡掃除雲煙杳霧是匡廬江山信美非吾土井邑繁雄想舊廬落筆縱橫看草檄感時憂憤欲成書要須起赴功名會莫守陳編似蠧魚赴陳元方感黨錮之禍憂憤成書十篇號陳子寄新衡陽徐使君左司山長醉墨淋漓天地間誰知大德不踰間世無孔子今希孔國有顔淵易鑄顔多士龍門一喬嶽斯文牛耳兩名山暮春九曲峯前水一笑風雩氣象還贈徐國諭英英直氣驗操存夜校羣書日灌園懶不到城三十載老猶落筆數千言吳公何敢輕招賈徐稚兹來特訪蕃衰拙邇來逢盛事德星逺逺照朱轓饒伯輿自餘干至國諭自南浦至徐立大旦夕又自上饒至又聞徑坂亦欲下顧贈蕭髙士槃澗老龍埋骨久交遊得爾最知心詩摹海嶼天風景琴弄仙臺玉笥音疇昔羽衣曽過我只今石鼎又聮吟丹成若欲歸山去恐被人間有物侵贈隆中黃進士遍逰天下好山川歸向隆中葺數椽似慕孔明效龍卧尚隨陶侃指牛眠詩書發冢笑何益富貴乞墦嗟可憐若語人時勸忠孝福田不似種心田勉癸丑新進士霞州守吏慶筵開喜為朝家得俊材九曲山川增氣槩八元人物照樽罍讖佳將報淮沙合文煥新迎御扁來不朽榮華軒冕外君看雲谷勝雲臺餞盧威仲狐腋羊皮孰劣優每嗟里社尚沉浮千篇南雪題幾遍一馬東風去不留吳地名髙誦梅福漢廷語吉趣朱遊柯山若問衰陳迹為説猶懷畎畝憂再用韻答當年骯髒厄伊優身寄枌榆宅尚浮芝鳳未朌羔屢聘檣烏將發燕難留朝廷終念孔文舉里社回思馬少遊煙霧滄波休健羡吾儕嫠緯莫忘憂寄六湖陳如晦琴劒前時為我來志同道合味悠哉每憐一水馬頭險惜放斯人鷁首回魯語手箋應畢卷汾亭指授想多材不知肯踐詩盟否菊已凋零梅又開前詩有秋英之約寄程滄洲山間藜杖看初春忽報滄洲除命新今日昌黎司憲部幾年陸贄任詞臣扶持世道豈無䇿宗主時賢今有人老懶貴逰書盡絶一詩隃寄霅江濵寄盧玉堂武子建上文忠音響絶爾來復説蔡翁盧君歸南浦顔無怍我老西河道不孤空有寸心馳記室絶無一字到中都吟成遣寄嗟何濶開卷應嗤此叟迂詗李斛峯右司數士英英未易招當時一網盡于蕭公才何止為陳瓘朝論今爭推杜喬見牟中書疏國定須賢扶宇宙士惟知道樂簞瓢鳳凰千仞需時下讒説新來已雪消詗斛峯李純父右司衰拙新來領建安郡齋夜夢繞餘干東都得爾名節重西賊聞之心膽寒海內四賢尚家食執事徐髙楊閩中一叟愧空餐幔亭仙掌文盟在好與伯輿來共看詗湖南刑使趙紫薇繡節當年立碧霄至今遺愛藹歡謡雲煙何止能開霽山嶽曽聞亦動搖縱未振衣華表著不應分席混漁樵餘干宰士今喬固定有詩筒慰寂寥登石鼓追思武夷餘干二老呈威仲雲間把酒更持螯九日登臨意氣豪自有此山題墨富獨推二老擅名髙禪關曽訪移泉脈亭扁重書鎮海濤老我空逰愧能賦得君藻筆撲名騷陳北山為余言忠定初書雲嶼文公睹未愜意更書為天風海濤今二扁並存再用韻答不羡叢菊并二螯羡君出語真俊豪崛竒退之石鼓句清逸永叔廬山髙壯懷傾倒湧泉寺健筆噓吸滄海濤後期進步登大頂上續風雅卑莊騷巖溪書堂登眺﨑嶇穿竹藍輿側髙下捫蘿石徑幽虎豹遁時深谷窈魚龍舞處大江浮公難間坐山中相我久吟披澤畔裘白石清泉知此意請將直釣釣璜流湧泉亭湧泉亭畔坐蒙茸手指三江撫萬松石鼓生雲深有意珠驪吐水密無蹤禽聲人語同時樂林影日華相映重邂逅一樽開笑口菊茰猶笑不從容挽王國録華峯早日得追隨議論詞章頗俊竒五羖固應羞自鬻一夔惜不佐來儀東嘉把􅊦論文日婺女停舟問易時黃壤竟埋斯士骨推賢不早嘆珠遺挽岩雲趙使君憶與東岩居里社蘿雲松月共詩盟傷心遂哭公三世墮淚難招爾九京領郡抗章生掇禍過庭吟藁死留名似聞難弟尤儒雅好率諸郎副旦評挽鄭知府先正當年遇阜陵在廷玉立指忠清甘棠笏得孫枝紹使竹符分棣蕚榮七帙駸駸登上夀諸郎鼎鼎擅英名北邙千古知無恨吟些聊供薤露聲挽朱夫人蘭陔送母度新阡追憶東岩老謫仙虀辦咄嗟供婦職肝刲一再續親年六珈偕老榮何盛二子乘舟晚可憐彤管責堪陳信史今將列女傳同編五言絶句寄李頤老易説刋成未心傳自法雲法雲勉齋居也寄聲揚舶使一力主斯文柬陳讜送鵝鶂鶂何為至於陵轉饋豫出哇吾不敢笑付老庖厨七言絶句寄仲節金華牧二首猶記衰翁佩印初曽將四學勸羣儒理學則程正公史學則司馬文正公文學則歐陽文忠公經濟學則范文正公只今郡守西山後好勉人人誦吕朱蔡西山乃先君子之師傳聞議論異柯山辨難何妨莫失歡試取景仁與君實中和問答幾書看吾輩論學且當以私書相往復如司馬文正公與范蜀公是也其後也問答雖不合而未嘗失相尊敬之心寄程滄州身是金華舊使君聞公新渥倍歡欣朱轓暫為東萊起收拾乾淳未墜文寄髙耻堂江西格了使湖南又似當年朱晦菴問學如公真少輩請將大道講氊談寄徐左司立大轉示近製阮嗣宗李白不及也課成二絶以贊紫洲洲上得詩筒展誦青霞在眼中白首漫郎應號叟黑頭永叔早稱翁人皆山斗瞻吏部誰敢文章近左司君看玉池金鯽句盡刋腥腐帶仙姿贈李喜觀謁徐徑坂一世龍門未易攀鯫生負笈造柯山束修以上吾斯誨應許吟風立雪還贈林行簡見徐徑坂紫霞洲上雨如絲白髮衰翁有所思吟付三山林敬則爛柯國手尚觀梅和韻詗徐徑坂聖斷鋤姦不大聲傳聞側席遲幽人人今天民之先覺幡然風俗還振振次徐徑坂衡陽使君韻示林敬則千仞岡頭一振衣共嗟鳳德卧郊扉近鋤蕭艾知天意會見朝陽露欲晞和徐徑坂衡陽使君韻題漁莊煙雨列子御風旬五日莊周稱夀八千秋歸歟煙雨濛濛景蕚集班衣賸勸酬送江墨莊徑坂仙翁名蓋代得君膠法喜臨池雞林鼠島皆知重爾亦聲華萬古垂寄語玉柯賢太守萬間精舍有詩盟邇來曽踐斯言否此事須公劇力成送陳善世似聞久客滄洲館曷不相從早數年老我一丘事耕釣勞君千里度山川抱琴幾宿滯秦溪多謝常丞寄近詩細咀絶無煙火氣其人可與遡濓伊常丞書來勉以紹洛濓不須逺逺苦求師恭敬淵源可細推歸路瑞安逢二戴戴綱戴仔才英而學甚正為豫再四説相思答鄭宜中太極成爭今幾年濓翁先得我同然經行醉墨匆匆就不謂朋儕今競傳畏暑門稀問字徒袖中妙語契周圖知君十倍侯芭學老我非雄尚索塗贈魏安石魏子本建溪人而寓居瓊山建士多深中而魏子諒直瓊人喜營利而魏子固窮豫以是愛魏子頃居雙泉與魏子居相鄰也日從之逰及豫遷儋耳魏子不逺數百里重趼過豫者三今豫居益貧無以資魏子之行魏子垂槖而歸笑買松明一擔曰是可以資夜讀也戲作小詩贈行魏子名安石字介然云彈鋏歸歟何太速捫腹掀髯飽薯粥囊空裘敝未全貧賸買松明照幽讀偶見孟博送仲久詩章輒題二絶代贈扁舟乘興山隂道春半園林雪未消便解貂裘從我在小􅙘幽寂共簞瓢且看青山覆白雲悠悠世事謾知聞扁舟却絶長江去回首紅塵路欲分因遣鄉書贈薑山嗣師近市依湖十里間扁舟朝往暮能還莫教老圃翻鋤盡留我他年葬骨山彭松溪簿來承絶句以紫霞翁見號因自號為紫霞翁成二絶走呈徑坂名齋取義本凡庸借屋蓬萊理釣篷特為紫陽訪霞紫臨流一笑就稱翁南澗當年浚紫洲韓尚書我今取號自虗舟倚欄惆悵青霞逺何日從君飛珮遊來喻感榮新恩之不暇遂爽逰武夷之約夀致政徐光祿易躋草四中書考難聚三千聽講生入侍親庭為一笑方瞳𢎞景轉精神題永陽文獻録姦魂偃月忌吳黃正氣難摧百錬剛竒響後來誰接續玉川拜疏植綱常冡中夷跖同枯骨身後逄干享令名讀遍永陽文獻録可憐齰舌老司成會饒伯輿徐子薦徐立大三髙士一首英英竒節東州彥凛凜清風南浦豪更有餘干饒有道建安堂上聚三髙秋詞雨放涼颷晚復晴小窗人亦共秋清月華網在蛛絲上錯認踈簾挂水晶
